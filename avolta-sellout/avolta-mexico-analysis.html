// ── FORMATTERS ────────────────────────────────────────────────────────────────
function fmtU(v){
  if(!v)return '-';
  if(Math.abs(v)>=1e6)return 'CHF '+(v/1e6).toFixed(2)+'M';
  if(Math.abs(v)>=1e3)return 'CHF '+(v/1e3).toFixed(1)+'K';
  return 'CHF '+Math.round(v).toLocaleString();
}
function fmtN(v){if(!v)return '-';return Math.round(v).toLocaleString();}
function fP(p){return p===null||p===undefined?'—':(p>0?'+':'')+p+'%';}
function yoy(a,b){return a?Math.round((b/a-1)*100*10)/10:null;}
function bg(p){return p===null?'bg-fl':p>=1?'bg-up':p<=-1?'bg-dn':'bg-fl';}
function fmtV(v,q){return _viewMode==='units'?fmtN(q):fmtU(v);}

document.addEventListener('click',function(e){

});
function _tDrop(uid){
  var d=document.getElementById('msd-'+uid);
  if(!d)return;
  var isOpen=d.classList.contains('open');
  document.querySelectorAll('.ms-drop.open').forEach(function(x){x.classList.remove('open');});
  if(!isOpen){
    if(!d.dataset.built) _buildDrop(uid);

  }
}
function _buildDrop(uid){
  var d=document.getElementById('msd-'+uid);
  if(!d) return;
  var parts=uid.split('-');var mk=parts[0];var key=parts.slice(1).join('-');
  var opts=_getOpts(mk,key);
  var sel=getFS(mk,key);
  var allCk=sel.size===0;
  var h='<div class="ms-item ms-all" onclick="_togAll(\''+uid+'\')"><input type="checkbox" id="ck-'+uid+'-all" '+(allCk?'checked':'')+'>All</div>';
  opts.forEach(function(o){
    var v=o.v||o;var lbl=o.l||o;
    var ck=sel.has(v)?'checked':'';
    h+='<div class="ms-item" onclick="_togItem(\''+uid+'\',\''+v.replace(/'/g,"\\'")+'\')">'
      +'<input type="checkbox" id="ck-'+uid+'-'+v.replace(/[^a-z0-9]/gi,'')+'" '+ck+'>'+lbl+'</div>';
  });

}
function _getOpts(mk,key){
  if(key==='month') return ['01','02','03','04','05','06','07','08','09','10','11','12'].map(function(m){return {v:m,l:MO_NAMES[m]};});
  if(key==='airport') return (D.apts_list[mk]||[]).map(function(a){return {v:a[0],l:a[0]+' – '+(D.apt_full[a[0]]||a[0])};});

  if(key==='family')  return (D.fams_list[mk]||[]).map(function(f){return {v:f,l:f};});

  return [];
}
function _togAll(uid){
  var parts=uid.split('-');var mk=parts[0];var key=parts.slice(1).join('-');
  getFS(mk,key).clear();

}
function _togItem(uid,val){
  var parts=uid.split('-');var mk=parts[0];var key=parts.slice(1).join('-');

  if(s.has(val)) s.delete(val); else s.add(val);

  if(d){delete d.dataset.built;}
  _closeAndRefresh(mk,uid);
}
function _closeAndRefresh(mk,uid){
  document.querySelectorAll('.ms-drop').forEach(function(d){d.classList.remove('open');});

// ── CROSS-DIM SUM HELPERS ─────────────────────────────────────────────────────
function _moSum(data,yr,selMos){
  var d=(data&&data[yr])||{};
  if(!selMos||selMos.size===0) return Object.values(d).reduce(function(s,v){return s+v;},0);
  var t=0; selMos.forEach(function(mo){t+=d[mo]||0;}); return t;
}
// Sum abf_v or abf_q with optional airport/brand/family filters
function _abfSum(abfData,selApt,selBr,selFam,yr,selMos){
  var t=0;
  var sigs=selApt&&selApt.size>0?Array.from(selApt):Object.keys(abfData);
  sigs.forEach(function(sig){
    var sd=abfData[sig]||{};
    var brs=selBr&&selBr.size>0?Array.from(selBr):Object.keys(sd);
    brs.forEach(function(br){
      var bd=sd[br]||{};
      var fams=selFam&&selFam.size>0?Array.from(selFam):Object.keys(bd);
      fams.forEach(function(f2){t+=_moSum(bd[f2],yr,selMos);});
    });
  });
  return t;
}
// Sum for a specific airport with optional brand/family filters
function _abfAptSum(abfData,sig,selBr,selFam,yr,selMos){
  var sd=abfData[sig]||{};var t=0;
  var brs=selBr&&selBr.size>0?Array.from(selBr):Object.keys(sd);
  brs.forEach(function(br){
    var bd=sd[br]||{};
    var fams=selFam&&selFam.size>0?Array.from(selFam):Object.keys(bd);
    fams.forEach(function(f2){t+=_moSum(bd[f2],yr,selMos);});
  });
  return t;
}
// Sum for a specific brand with optional airport/family filters
function _abfBrSum(abfData,selApt,br,selFam,yr,selMos){
  var sigs=selApt&&selApt.size>0?Array.from(selApt):Object.keys(abfData);
  var t=0;
  sigs.forEach(function(sig){
    var bd=(abfData[sig]||{})[br]||{};
    var fams=selFam&&selFam.size>0?Array.from(selFam):Object.keys(bd);
    fams.forEach(function(f2){t+=_moSum(bd[f2],yr,selMos);});
  });
  return t;
}
// Sum for a specific family with optional airport/brand filters
function _abfFamSum(abfData,selApt,selBr,f2,yr,selMos){
  var sigs=selApt&&selApt.size>0?Array.from(selApt):Object.keys(abfData);
  var t=0;
  sigs.forEach(function(sig){
    var sd=abfData[sig]||{};
    var brs=selBr&&selBr.size>0?Array.from(selBr):Object.keys(sd);
    brs.forEach(function(br){t+=_moSum((sd[br]||{})[f2],yr,selMos);});
  });
  return t;
}
// Smart total: uses cross-dim when brand/family filters active
function _totalV(mk,yr,selMos,selApt,selBr,selFam){
  var hasBr=selBr&&selBr.size>0,hasFam=selFam&&selFam.size>0;
  if(!hasBr&&!hasFam){
    if(!selApt||selApt.size===0){
      return (D.monthly[mk]||[]).filter(function(r){return !selMos||selMos.size===0||selMos.has(r.mo);})
             .reduce(function(t,r){return t+(r[yr]||0);},0);
    }
    var t=0; selApt.forEach(function(sig){t+=_moSum((D.apt_mo_v[mk]||{})[sig],yr,selMos);}); return t;
  }
  return _abfSum(D.abf_v[mk]||{},selApt,selBr,selFam,yr,selMos);
}
function _totalQ(mk,yr,selMos,selApt,selBr,selFam){
  var hasBr=selBr&&selBr.size>0,hasFam=selFam&&selFam.size>0;
  if(!hasBr&&!hasFam){
    if(!selApt||selApt.size===0){
      return (D.monthly[mk]||[]).filter(function(r){return !selMos||selMos.size===0||selMos.has(r.mo);})
             .reduce(function(t,r){return t+(r['u'+yr]||0);},0);
    }
    var t=0; selApt.forEach(function(sig){t+=_moSum((D.apt_mo_q[mk]||{})[sig],yr,selMos);}); return t;
  }
  return _abfSum(D.abf_q[mk]||{},selApt,selBr,selFam,yr,selMos);
}
function _buildSeries(mk,selMos,selApt,selBr,selFam){
  var hasBr=selBr&&selBr.size>0,hasFam=selFam&&selFam.size>0;
  var base=D.monthly[mk]||[];
  if(!hasBr&&!hasFam){
    if(!selApt||selApt.size===0) return base;
    return base.map(function(item){
      var mo=item.mo;var ni={m:item.m,mo:mo};
      _ay.forEach(function(yr){
        var tv=0,tq=0;
        selApt.forEach(function(sig){
          tv+=((D.apt_mo_v[mk][sig]||{})[yr]||{})[mo]||0;
          tq+=((D.apt_mo_q[mk][sig]||{})[yr]||{})[mo]||0;
        });
        ni[yr]=tv;ni['u'+yr]=tq;
      });
      return ni;
    });
  }
  var abfV=D.abf_v[mk]||{},abfQ=D.abf_q[mk]||{};
  return base.map(function(item){
    var mo=item.mo;var ni={m:item.m,mo:mo};
    var smo=new Set([mo]);
    _ay.forEach(function(yr){
      ni[yr]=_abfSum(abfV,selApt,selBr,selFam,yr,smo);
      ni['u'+yr]=_abfSum(abfQ,selApt,selBr,selFam,yr,smo);
    });
    return ni;
  });
}

// ── AIRPORT TABLE ─────────────────────────────────────────────────────────────

function mtxRow(r,cols,f25key,f26key,t25key,t26key,pctKey){
  var isQ=_skuMode==='units';
  var f25=r[isQ?'q25':f25key]||{};var f26=r[isQ?'q26':f26key]||{};
  var t25=r[isQ?'qt25':t25key]||0;var t26=r[isQ?'qt26':t26key]||0;
  var pct=isQ?(r.qpct!==undefined?r.qpct:null):r[pctKey];
  var pcls=pct===null?'bg-fl':(pct>=10?'bg-up':pct<=-10?'bg-dn':'bg-fl');

  cols.forEach(function(c){h+='<td class="num">'+(f25[c]?fmtN(f25[c]):'-')+'</td>';});
  h+='<td style="border-left:2px solid var(--accent);font-weight:700">'+fmtN(t26)+'</td>';

    var vp=f25[c]||0,vc=f26[c]||0;
    var p=vp>0?Math.round((vc/vp-1)*100):null;
    var cls=p===null?'':(p>=30?'g30p':p>=20?'g20p':p>=10?'g10p':p<=-30?'d30p':p<=-20?'d20p':p<=-10?'d10p':'');

  });
  return h+'<td class="num" style="border-left:2px solid var(--accent)"><span class="badge '+pcls+'">'+fP(pct)+'</span></td>';
}

// ── APT × FAMILY MATRIX ───────────────────────────────────────────────────────
function aptFamMatrix(mk,selApt,selFam){
  var grp=D.apt_fam_mtx[mk];
  if(!grp||!grp.fams.length) return '<p style="color:var(--dim);padding:12px">No data</p>';
  var cols=grp.stores;
  if(selApt&&selApt.size>0) cols=cols.filter(function(s){return selApt.has(s);});
  var rows=grp.fams;
  if(selFam&&selFam.size>0) rows=rows.filter(function(r){return selFam.has(r.f);});
  var lbl=_skuMode==='units'?'Units':'CHF';
  var h='<div class="sku-wrap"><table><thead><tr>'
    +mtxHdr(cols,5,'Family',null)+'</tr></thead><tbody>';
  rows.forEach(function(r){
    if(!r.t25&&!r.t26) return;
    // recompute totals for filtered cols
    var t25=0,t26=0,qt25=0,qt26=0;
    cols.forEach(function(c){t25+=r.v25[c]||0;t26+=r.v26[c]||0;qt25+=r.q25[c]||0;qt26+=r.q26[c]||0;});
    if(!t25&&!t26) return;
    var rr=Object.assign({},r,{t25:t25,t26:t26,qt25:qt25,qt26:qt26,
      pct:t25?Math.round((t26/t25-1)*100*10)/10:null,
      qpct:qt25?Math.round((qt26/qt25-1)*100*10)/10:null});
    h+='<tr><td style="position:sticky;left:0;background:var(--card);z-index:1;border-right:2px solid var(--accent);font-weight:700">'+r.f+'</td>';
    h+=mtxRow(rr,cols,'v25','v26','t25','t26','pct')+'</tr>';
  });

}

// ── APT × SKU MATRIX ──────────────────────────────────────────────────────────

      h+='<tr>';
      h+='<td style="position:sticky;left:0;background:var(--card);z-index:1;border-right:2px solid var(--accent);font-family:monospace;font-weight:700">'+r.sku+'</td>';
      h+='<td style="border-right:2px solid var(--accent);font-size:10px;color:var(--dim)">'+r.f2+'</td>';
      h+=mtxRow(rr,cols,'v25','v26','t25','t26','pct')+'</tr>';
    });

  return h+'</tbody></table></div>';
}

      +'</td>';
    h+='<td class="num" style="font-weight:700;background:#1e293b">'+fmtV(apt.v25,apt.q25)+'</td>';
    h+='<td class="num" style="font-weight:700;background:#1e293b">'+fmtV(apt.v26,apt.q26)+'</td>';
    h+='<td class="num" style="background:#1e293b"><span class="badge '+pcls+'">'+fP(p)+'</span></td>';
    h+='</tr>';

    if(!isExp) return;

    visibleFams.forEach(function(fam){
      var famExpKey=_hK(mk,apt.sig,fam.f);
      var isFamExp=!!_hier_exp[famExpKey];
      var fv25=isU?fam.q25:fam.v25;
      var fv26=isU?fam.q26:fam.v26;
      var fp2=fv25?Math.round((fv26/fv25-1)*100*10)/10:null;
      var fpcls=fp2===null?'bg-fl':(fp2>=1?'bg-up':fp2<=-1?'bg-dn':'bg-fl');

      var visibleSkus=fam.skus;
      if(selSku&&selSku.size>0) visibleSkus=visibleSkus.filter(function(s){return selSku.has(s.sku);});

      // Family row
      h+='<tr class="hier-fam" onclick="_togHierFam(\''+mk+'\',\''+apt.sig.replace(/'/g,"\\'")+'\',\''+fam.f.replace(/'/g,"\\'")+'\')">';
      h+='<td style="position:sticky;left:0;background:#0f1a2b;z-index:1;padding-left:26px">'
        +'<span class="hier-tog">'+(isFamExp?'▾':'▸')+'</span>'
        +fam.f
        +' <span style="color:var(--dim);font-size:10px">('+visibleSkus.length+' SKUs)</span>'
        +'</td>';
      h+='<td class="num" style="background:#0f1a2b">'+fmtV(fam.v25,fam.q25)+'</td>';
      h+='<td class="num" style="background:#0f1a2b">'+fmtV(fam.v26,fam.q26)+'</td>';
      h+='<td class="num" style="background:#0f1a2b"><span class="badge '+fpcls+'">'+fP(fp2)+'</span></td>';
      h+='</tr>';

      if(!isFamExp) return;

      visibleSkus.forEach(function(sku){
        var sv25=isU?sku.q25:sku.v25;
        var sv26=isU?sku.q26:sku.v26;
        var sp2=sv25?Math.round((sv26/sv25-1)*100*10)/10:null;
        var spcls=sp2===null?'bg-fl':(sp2>=1?'bg-up':sp2<=-1?'bg-dn':'bg-fl');

        h+='<tr class="hier-sku">';
        h+='<td style="position:sticky;left:0;background:var(--bg);z-index:1;padding-left:46px">'
          +'<span style="font-family:monospace;font-weight:700;color:var(--accent)">'+sku.sku+'</span>'
          +' <span style="color:var(--dim);font-size:10px">'+sku.desc+'</span>'
          +'</td>';
        h+='<td class="num">'+(sv25?fmtV(sku.v25,sku.q25):'-')+'</td>';
        h+='<td class="num">'+(sv26?fmtV(sku.v26,sku.q26):'-')+'</td>';
        h+='<td class="num"><span class="badge '+spcls+'">'+fP(sp2)+'</span></td>';
        h+='</tr>';
      });
    });
  });
  return h+'</tbody></table></div>';
}

// ── 4-LEVEL HIERARCHY (DP): Airport → Brand → Family → SKU ───────────────────
function hierMatrixDP(mk,selApt,selBr,selFam,selSku){
  var hier=D.apt_hier_dp[mk];
  if(!hier||!hier.length) return '<p style="color:var(--dim);padding:12px">No data</p>';
  var isU=_skuMode==='units';
  var apts=hier;
  if(selApt&&selApt.size>0) apts=apts.filter(function(a){return selApt.has(a.sig);});
  var h='<div class="sku-wrap"><table style="min-width:420px">'
    +'<thead><tr>'
    +'<th style="position:sticky;left:0;background:var(--card);z-index:2;min-width:280px">Airport / Brand / Family / SKU</th>'
    +'<th class="num" style="min-width:90px">'+_ly+' YTD</th>'
    +'<th class="num" style="min-width:90px">'+_cy+' YTD</th>'
    +'<th class="num" style="min-width:70px">YoY %</th>'
    +'</tr></thead><tbody>';
  apts.forEach(function(apt){
    var expKey=_hK(mk,apt.sig);
    var isExp=!!_hier_exp[expKey];
    var v25=isU?apt.q25:apt.v25,v26=isU?apt.q26:apt.v26;
    var p=v25?Math.round((v26/v25-1)*100*10)/10:null;
    var pcls=p===null?'bg-fl':(p>=1?'bg-up':p<=-1?'bg-dn':'bg-fl');
    var visBrands=apt.brands;
    if(selBr&&selBr.size>0) visBrands=visBrands.filter(function(b){return selBr.has(b.b);});
    h+='<tr class="hier-apt" onclick="_togHierApt(\''+mk+'\',\''+apt.sig.replace(/'/g,"\\'")+'\')"><td style="position:sticky;left:0;background:#1e293b;z-index:1;font-weight:700"><span class="hier-tog">'+(isExp?'▾':'▸')+'</span><b>'+apt.sig+'</b> <span style="color:var(--dim);font-size:10px">'+apt.full+'</span> <span style="color:var(--dim);font-size:10px">('+visBrands.length+' brands)</span></td>';
    h+='<td class="num" style="font-weight:700;background:#1e293b">'+fmtV(apt.v25,apt.q25)+'</td>';
    h+='<td class="num" style="font-weight:700;background:#1e293b">'+fmtV(apt.v26,apt.q26)+'</td>';
    h+='<td class="num" style="background:#1e293b"><span class="badge '+pcls+'">'+fP(p)+'</span></td></tr>';
    if(!isExp) return;
    visBrands.forEach(function(brand){
      var brExpKey=_hK4(mk,apt.sig,brand.b);
      var isBrExp=!!_hier_exp[brExpKey];
      var bv25=isU?brand.q25:brand.v25,bv26=isU?brand.q26:brand.v26;
      var bp=bv25?Math.round((bv26/bv25-1)*100*10)/10:null;
      var bpcls=bp===null?'bg-fl':(bp>=1?'bg-up':bp<=-1?'bg-dn':'bg-fl');
      var visFams=brand.fams;
      if(selFam&&selFam.size>0) visFams=visFams.filter(function(f){return selFam.has(f.f);});
      h+='<tr class="hier-fam" onclick="_togHierBr(\''+mk+'\',\''+apt.sig.replace(/'/g,"\\'")+'\',\''+brand.b.replace(/'/g,"\\'")+'\')"><td style="position:sticky;left:0;background:#0f1a2b;z-index:1;padding-left:26px"><span class="hier-tog">'+(isBrExp?'▾':'▸')+'</span><b style="color:#a78bfa">'+brand.b+'</b> <span style="color:var(--dim);font-size:10px">('+visFams.length+' fam)</span></td>';
      h+='<td class="num" style="background:#0f1a2b">'+fmtV(brand.v25,brand.q25)+'</td>';
      h+='<td class="num" style="background:#0f1a2b">'+fmtV(brand.v26,brand.q26)+'</td>';
      h+='<td class="num" style="background:#0f1a2b"><span class="badge '+bpcls+'">'+fP(bp)+'</span></td></tr>';
      if(!isBrExp) return;
      visFams.forEach(function(fam){
        var famExpKey=_hK5(mk,apt.sig,brand.b,fam.f);
        var isFamExp=!!_hier_exp[famExpKey];
        var fv25=isU?fam.q25:fam.v25,fv26=isU?fam.q26:fam.v26;
        var fp2=fv25?Math.round((fv26/fv25-1)*100*10)/10:null;
        var fpcls=fp2===null?'bg-fl':(fp2>=1?'bg-up':fp2<=-1?'bg-dn':'bg-fl');
        var visSkus=fam.skus;
        if(selSku&&selSku.size>0) visSkus=visSkus.filter(function(s){return selSku.has(s.sku);});
        h+='<tr style="background:#071020;cursor:pointer" onclick="_togHierFamDP(\''+mk+'\',\''+apt.sig.replace(/'/g,"\\'")+'\',\''+brand.b.replace(/'/g,"\\'")+'\',\''+fam.f.replace(/'/g,"\\'")+'\')"><td style="position:sticky;left:0;background:#071020;z-index:1;padding-left:46px"><span class="hier-tog">'+(isFamExp?'▾':'▸')+'</span>'+fam.f+' <span style="color:var(--dim);font-size:10px">('+visSkus.length+' SKUs)</span></td>';
        h+='<td class="num" style="background:#071020">'+fmtV(fam.v25,fam.q25)+'</td>';
        h+='<td class="num" style="background:#071020">'+fmtV(fam.v26,fam.q26)+'</td>';
        h+='<td class="num" style="background:#071020"><span class="badge '+fpcls+'">'+fP(fp2)+'</span></td></tr>';
        if(!isFamExp) return;
        visSkus.forEach(function(sku){
          var sv25=isU?sku.q25:sku.v25,sv26=isU?sku.q26:sku.v26;
          var sp=sv25?Math.round((sv26/sv25-1)*100*10)/10:null;
          var spcls=sp===null?'bg-fl':(sp>=1?'bg-up':sp<=-1?'bg-dn':'bg-fl');
          h+='<tr class="hier-sku"><td style="position:sticky;left:0;background:var(--bg);z-index:1;padding-left:66px"><span style="font-family:monospace;font-weight:700;color:var(--accent)">'+sku.sku+'</span> <span style="color:var(--dim);font-size:10px">'+sku.desc+'</span></td>';
          h+='<td class="num">'+(sv25?fmtV(sku.v25,sku.q25):'-')+'</td>';
          h+='<td class="num">'+(sv26?fmtV(sku.v26,sku.q26):'-')+'</td>';
          h+='<td class="num"><span class="badge '+spcls+'">'+fP(sp)+'</span></td></tr>';
        });
      });
    });
  });
  return h+'</tbody></table></div>';
}

// ── TAB RENDERING ─────────────────────────────────────────────────────────────
function renderTab(id){
  _activeTab=id;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.id===id);});

  // ── STOCK ANALYSIS ────────────────────────────────────────────────────────
  if(id==='STOCK'){
    var _MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var n26=D.n_mo26||5;
    if(!window._stExp) window._stExp=new Set();
    window._stKeys=[];
    window._stToggle=function(i){
      var k=window._stKeys[i];
      if(window._stExp.has(k)) window._stExp.delete(k); else window._stExp.add(k);
      renderTab('STOCK');
    };
    function _stK(k){window._stKeys.push(k);return window._stKeys.length-1;}
    function stFmt2(n){return n==null?'--':(Math.round(n*10)/10).toFixed(1);}
    function stCovCls(c){return c==null?'':c<1?'dn':c<3?'stk-warn':'';}
    function stCols(nd){
      var a25=nd.q25/12; var a26=nd.q26/n26;
      var cv=a26>0?nd.sq/a26:null;
      return '<td class="num">'+fmtN(nd.sq)+'</td>'
        +'<td class="num">'+fmtU(nd.sv)+'</td>'
        +'<td class="num">'+fmtN(nd.q25)+'</td>'
        +'<td class="num">'+fmtN(nd.q26)+'</td>'
        +'<td class="num" style="color:var(--dim)">'+fmtN(a25)+'</td>'
        +'<td class="num" style="color:var(--dim)">'+fmtN(a26)+'</td>'
        +'<td class="num '+stCovCls(cv)+'">'+stFmt2(cv)+'</td>';
    }
    // ── Filters: City + Airport ────────────────────────────────────────────
    if(!_fs['STOCK']) _fs['STOCK']={city:new Set(),apt:new Set()};
    if(!_fs['STOCK'].city) _fs['STOCK'].city=new Set();
    if(!_fs['STOCK'].apt)  _fs['STOCK'].apt=new Set();
    var stFsCity=_fs['STOCK'].city; var stFsApt=_fs['STOCK'].apt;
    window._stTogF=function(field,val,all){
      var s=_fs['STOCK'][field];
      if(all) s.clear();
      else if(s.has(val)) s.delete(val); else s.add(val);
      renderTab('STOCK');
    };
    var activeCitiesMx=stFsCity.size>0?stFsCity:null;
    var allCities=[...new Set(D.stock_matrix.map(function(r){return r.city||'';}))].filter(Boolean).sort();
    var allApts=[...new Set(D.stock_matrix
      .filter(function(r){return !activeCitiesMx||activeCitiesMx.has(r.city||'');})
      .map(function(r){return r.apt||r.sig;}))].filter(Boolean).sort();
    function _stDropMx(uid){
      var d=document.getElementById('stk-d-'+uid);if(!d) return;
      var open=d.classList.contains('open');
      document.querySelectorAll('.ms-drop.open').forEach(function(x){x.classList.remove('open');});
      if(!open) d.classList.add('open');
    }
    function _stFBuild(uid,label,opts,sel,field){
      var lbl=sel.size===0?'All '+label:(sel.size+' selected');
      var h='<div class="fg"><label>'+label+'</label>'
        +'<button class="ms-btn'+(sel.size>0?' active-filter':'')+'" onclick="_stDropMx(\''+uid+'\')">'
        +lbl+'</button><div class="ms-drop" id="stk-d-'+uid+'">'
        +'<div class="ms-item ms-all"><input type="checkbox"'+(sel.size===0?' checked':'')
        +' onchange="_stTogF(\''+field+'\',null,true)"><span>All '+label+'</span></div>';
      opts.forEach(function(o){
        h+='<div class="ms-item"><input type="checkbox"'+(sel.has(o)?' checked':'')
          +' onchange="_stTogF(\''+field+'\',\''+o.replace(/'/g,'&#39;')+'\',false)"><span>'+o+'</span></div>';
      });
      return h+'</div></div>';
    }
    var stFb='<div class="filter-bar">'
      +_stFBuild('city','City',allCities,stFsCity,'city')
      +_stFBuild('apt','Airport',allApts,stFsApt,'apt')
      +'<button class="fr-btn" onclick="delete _fs[\'STOCK\'];renderTab(\'STOCK\')">✕ Reset</button>'
      +'</div>';
    // apply filters
    var vis=D.stock_matrix.filter(function(r){
      if(stFsCity.size>0&&!stFsCity.has(r.city||'')) return false;
      if(stFsApt.size>0&&!stFsApt.has(r.apt||r.sig)) return false;
      return true;
    });
    // Build tree from filtered records
    var coMap={};
    vis.forEach(function(r){
      var co=r.co||'Mexico'; var city=r.city||''; var f2k=r.f2||'';
      if(!coMap[co]) coMap[co]={sq:0,sv:0,q25:0,q26:0,cities:{}};
      var CN=coMap[co]; CN.sq+=r.sq;CN.sv+=r.sv;CN.q25+=r.q25;CN.q26+=r.q26;
      if(!CN.cities[city]) CN.cities[city]={sq:0,sv:0,q25:0,q26:0,sigs:{}};
      var CY=CN.cities[city]; CY.sq+=r.sq;CY.sv+=r.sv;CY.q25+=r.q25;CY.q26+=r.q26;
      if(!CY.sigs[r.sig]) CY.sigs[r.sig]={sq:0,sv:0,q25:0,q26:0,apt:r.apt||r.sig,f2s:{}};
      var AP=CY.sigs[r.sig]; AP.sq+=r.sq;AP.sv+=r.sv;AP.q25+=r.q25;AP.q26+=r.q26;
      if(!AP.f2s[f2k]) AP.f2s[f2k]={sq:0,sv:0,q25:0,q26:0,skus:[]};
      var F2=AP.f2s[f2k]; F2.sq+=r.sq;F2.sv+=r.sv;F2.q25+=r.q25;F2.q26+=r.q26;
      F2.skus.push(r);
    });
    function nmTd(label,key,depth,exp,tip){
      var ki=_stK(key); var pad=8+depth*18;
      return '<td class="stk-nm" style="padding-left:'+pad+'px" onclick="_stToggle('+ki+')" title="'+(tip||label)+'">'
        +'<span class="stk-ic">'+(exp?'▾':'▸')+'</span>'+label+'</td>';
    }
    function leafTd(r,depth){
      var pad=8+depth*18;
      return '<td class="stk-nm stk-leaf-nm" style="padding-left:'+pad+'px" title="'+r.sku+' — '+r.desc+'">'
        +'<span class="stk-ic stk-leaf-ic">—</span><b>'+r.sku+'</b>'
        +(r.desc?' <span style="color:var(--dim);font-size:10px">'+r.desc+'</span>':'')+'</td>';
    }
    // Mexico: start at City level (no country parent row)
    var _mxCities={};
    vis.forEach(function(r){
      var city=r.city||''; var f2k=r.f2||'';
      if(!_mxCities[city]) _mxCities[city]={sq:0,sv:0,q25:0,q26:0,sigs:{}};
      var CY=_mxCities[city]; CY.sq+=r.sq;CY.sv+=r.sv;CY.q25+=r.q25;CY.q26+=r.q26;
      if(!CY.sigs[r.sig]) CY.sigs[r.sig]={sq:0,sv:0,q25:0,q26:0,apt:r.apt||r.sig,f2s:{}};
      var AP=CY.sigs[r.sig]; AP.sq+=r.sq;AP.sv+=r.sv;AP.q25+=r.q25;AP.q26+=r.q26;
      if(!AP.f2s[f2k]) AP.f2s[f2k]={sq:0,sv:0,q25:0,q26:0,skus:[]};
      var F2=AP.f2s[f2k]; F2.sq+=r.sq;F2.sv+=r.sv;F2.q25+=r.q25;F2.q26+=r.q26;
      F2.skus.push(r);
    });
    var rows='';
    Object.keys(_mxCities).sort().forEach(function(city){
      var CY=_mxCities[city]; var cyK='cy:'+city; var cyEx=window._stExp.has(cyK);
      rows+='<tr class="stk-r0">'+nmTd(city||'—',cyK,0,cyEx)+stCols(CY)+'</tr>';
      if(!cyEx) return;
      var sigKeys=Object.keys(CY.sigs).sort(function(a,b){return(CY.sigs[a].apt||a).localeCompare(CY.sigs[b].apt||b);});
      sigKeys.forEach(function(sig){
        var AP=CY.sigs[sig]; var apK='a:'+city+'|'+sig; var apEx=window._stExp.has(apK);
        rows+='<tr class="stk-r1">'+nmTd(AP.apt||sig,apK,1,apEx,sig+' — '+(AP.apt||sig))+stCols(AP)+'</tr>';
        if(!apEx) return;
        Object.keys(AP.f2s).sort().forEach(function(f2){
          var F2=AP.f2s[f2]; var f2K='f:'+city+'|'+sig+'|'+f2; var f2Ex=window._stExp.has(f2K);
          rows+='<tr class="stk-r2">'+nmTd(f2||'—',f2K,2,f2Ex)+stCols(F2)+'</tr>';
          if(!f2Ex) return;
          var skusSorted=F2.skus.slice().sort(function(a,b){return a.sku.localeCompare(b.sku);});
          skusSorted.forEach(function(r){
            rows+='<tr class="stk-r3">'+leafTd(r,3)+stCols({sq:r.sq,sv:r.sv,q25:r.q25,q26:r.q26})+'</tr>';
          });
        });
      });
    });
    var _isFilt=stFsCity.size>0||stFsApt.size>0;
    var fSV=_isFilt?vis.reduce(function(s,r){return s+r.sv;},0):D.total_sv;
    var fSQ=_isFilt?vis.reduce(function(s,r){return s+r.sq;},0):D.total_sq;
    var fNSku=new Set(vis.filter(function(r){return r.sq>0;}).map(function(r){return r.sku;})).size;
    var h='<style>'
      +'.stk-nm{white-space:nowrap;max-width:300px;overflow:hidden;text-overflow:ellipsis;cursor:pointer}'
      +'.stk-leaf-nm{cursor:default}'
      +'.stk-ic{display:inline-block;width:16px;font-size:10px;color:var(--accent)}'
      +'.stk-leaf-ic{color:var(--dim)}'
      +'.stk-r0>td{font-weight:700;font-size:13px;background:var(--card)}'
      +'.stk-r1>td{font-size:12px;background:var(--bg)}'
      +'.stk-r2>td{font-size:12px;background:var(--card)}'
      +'.stk-r3>td{font-size:11px;background:var(--bg)}'
      +'.stk-r4>td{font-size:10px;background:var(--card)}'
      +'.stk-r4>td:not(:first-child){color:var(--dim)}'
      +'.stk-warn{color:var(--accent);font-weight:700}'
      +'</style>';
    h+=stFb;
    h+=kpiRow([
      {lbl:'Stock Value',val:fmtU(fSV),sub:'CHF — '+D.stock_period+(_isFilt?' (filtered)':'')},
      {lbl:'Stock Qty',val:fmtN(fSQ),sub:'units in stock'},
      {lbl:'SKUs w/ Stock',val:String(fNSku),sub:'unique SKUs'},
      {lbl:'2026 Period',val:String(n26)+' months',sub:'Jan – '+_MO[n26-1]},
    ],4);
    h+='<div class="card"><h3>Stock Analysis Matrix</h3>'
      +'<div class="st">Stock period: <b>'+D.stock_period+'</b>'
      +' &nbsp;|&nbsp; Avg/mo 2025 = annual ÷ 12'
      +' &nbsp;|&nbsp; Avg/mo 2026 = YTD ÷ '+n26+' months'
      +' &nbsp;|&nbsp; Coverage = Stock Qty ÷ Avg/mo 2026'
      +' &nbsp;|&nbsp; <span class="dn">■ &lt;1 mo</span>'
      +' <span class="stk-warn">■ 1–3 mo</span>'
      +' <span style="color:var(--dim)">■ ≥3 mo</span></div>'
      +'<div class="tbl-wrap"><table><thead><tr>'
      +'<th style="min-width:240px">City / Airport / Family / SKU</th>'
      +'<th class="num">Stock Qty</th>'
      +'<th class="num">Stock Value CHF</th>'
      +'<th class="num">Sales Qty 2025</th>'
      +'<th class="num">Sales Qty 2026</th>'
      +'<th class="num">Avg/mo 2025</th>'
      +'<th class="num">Avg/mo 2026</th>'
      +'<th class="num">Coverage (mo)</th>'
      +'</tr></thead><tbody>'
      +rows+'</tbody></table></div></div>';
    document.getElementById('content').innerHTML=h;
    return;
  }

  _initFS(id);
  var mk=id;
  var selMos=getFS(mk,'month');
  var selApt=getFS(mk,'airport');
  var selFam=getFS(mk,'family');
  var selBr =getFS(mk,'brand');
  var selSku=getFS(mk,'sku');
  var mktLabel=mk==='DF'?'Duty Free':'Duty Paid';
  var moLabel=selMos.size===0?'All Months':Array.from(selMos).sort().map(function(m){return MO_NAMES[m];}).join(', ');

  // ── KPIs ─────────────────────────────────────────────────────────────────
  var v26=_totalV(mk,_cy,selMos,selApt,selBr,selFam);
  var v25=_totalV(mk,_ly,selMos,selApt,selBr,selFam);
  var v24=_totalV(mk,'2024',selMos,selApt,selBr,selFam);
  var q26=_totalQ(mk,_cy,selMos,selApt,selBr,selFam);
  var q25=_totalQ(mk,_ly,selMos,selApt,selBr,selFam);
  var q24=_totalQ(mk,'2024',selMos,selApt,selBr,selFam);
  var nApt=(selApt&&selApt.size>0)?selApt.size:Object.keys(D.apt_mo_v[mk]||{}).length;

  var h=buildFilterBar(mk);
  h+=kpiRow([
    {lbl:_cy+' Revenue',val:fmtU(v26),sub:fP(yoy(v25,v26))+' vs '+_ly,cls:bg(yoy(v25,v26)),new26:true},
    {lbl:_cy+' Units',val:fmtN(q26),sub:fP(yoy(q25,q26))+' vs '+_ly,cls:bg(yoy(q25,q26)),new26:true},
    {lbl:_ly+' Revenue',val:fmtU(v25),sub:fP(yoy(v24,v25))+' vs 2024',cls:bg(yoy(v24,v25))},
    {lbl:_ly+' Units',val:fmtN(q25),sub:fP(yoy(q24,q25))+' vs 2024',cls:bg(yoy(q24,q25))},
    {lbl:'Airports',val:String(nApt),sub:mktLabel+' Mexico'},
  ],5);

  // ── Trend + Airport bar ───────────────────────────────────────────────────
  h+='<div class="g2">';
  h+='<div class="card"><h3>Monthly Revenue Trend</h3><div class="st">'+moLabel+' | 2023-'+_cy+'</div>'
    +'<div class="chart-wrap lg"><canvas id="ch-'+mk+'-mo"></canvas></div></div>';
  h+='<div class="card"><h3>Revenue by Airport</h3><div class="st">'+moLabel+' | '+_ly+' vs '+_cy+'</div>'
    +'<div class="chart-wrap lg"><canvas id="ch-'+mk+'-bar"></canvas></div></div>';
  h+='</div>';

  // ── Airport table ─────────────────────────────────────────────────────────
  h+='<div class="card"><h3>Airport Performance</h3>'
    +'<div class="st">'+moLabel+'</div>'
    +'<div class="tbl-wrap">'+aptTable(mk,selMos,selApt,selBr,selFam)+'</div></div>';

  // ── Family table ──────────────────────────────────────────────────────────
  h+='<div class="card"><h3>Family Mix (FAMILY 2)</h3>'
    +'<div class="st">'+moLabel+'</div>'
    +'<div class="tbl-wrap">'+famTable(mk,selMos,selFam,selApt,selBr)+'</div></div>';

  // ── Brand analysis (DP only) ──────────────────────────────────────────────
  if(mk==='DP'){
    h+='<div class="card"><h3>Brand Performance — Duty Paid</h3>'
      +'<div class="st">'+moLabel+' | comparativo por ano</div>'
      +'<div class="chart-wrap lg" style="margin-bottom:16px"><canvas id="ch-'+mk+'-br"></canvas></div>'
      +'<div class="tbl-wrap">'+brTable(mk,selMos,selBr,selApt,selFam)+'</div></div>';
  }

  // ── Stores table ──────────────────────────────────────────────────────────
  h+='<div class="card"><h3>Store Performance</h3>'
    +'<div class="st">'+moLabel+' | filtrado por aeroporto quando selecionado</div>'
    +'<div class="tbl-wrap">'+stoTable(mk,selMos,selApt)+'</div></div>';

  // ── Hierarchical matrix ───────────────────────────────────────────────────
  var matTitle=mk==='DP'?'Airport → Brand → Family → SKU':'Airport → Family → SKU';
  h+='<div class="card"><h3>Matrix: '+matTitle+' (YTD '+_ly+'/'+_cy+')</h3>'
    +'<div class="st">▸ Clique para expandir os níveis · YTD Jan–Apr</div>'
    +'<div class="mode-wrap" style="margin-bottom:8px">'
    +'<button class="mode-btn'+(_skuMode==='chf'?' active':'')+'\" onclick="_setSku(\'chf\',\''+mk+'\')">CHF</button>'
    +'<button class="mode-btn'+(_skuMode==='units'?' active':'')+'\" onclick="_setSku(\'units\',\''+mk+'\')">Units</button>'
    +'</div>'
    +(mk==='DP'?hierMatrixDP(mk,selApt,selBr,selFam,selSku):hierMatrix(mk,selApt,selFam,selSku))+'</div>';

  document.getElementById('content').innerHTML=h;

  // ── charts ────────────────────────────────────────────────────────────────
  var series=_buildSeries(mk,selMos,selApt,selBr,selFam);
  moChart('ch-'+mk+'-mo',series);

  // Airport bar chart (cross-filtered)
  var hasBr2=selBr&&selBr.size>0,hasFam2=selFam&&selFam.size>0;
  var abfBarV=D.abf_v[mk]||{},abfBarQ=D.abf_q[mk]||{};
  var aptKeys=Object.keys(D.apt_mo_v[mk]||{});
  if(selApt&&selApt.size>0) aptKeys=aptKeys.filter(function(s){return selApt.has(s);});
  var isU=_viewMode==='units';
  var sorted=aptKeys.map(function(sig){
    var d25,d26;
    if(!hasBr2&&!hasFam2){
      d25=isU?_moSum((D.apt_mo_q[mk]||{})[sig],_ly,selMos):_moSum((D.apt_mo_v[mk]||{})[sig],_ly,selMos);
      d26=isU?_moSum((D.apt_mo_q[mk]||{})[sig],_cy,selMos):_moSum((D.apt_mo_v[mk]||{})[sig],_cy,selMos);
    } else {
      var abfD=isU?abfBarQ:abfBarV;
      d25=_abfAptSum(abfD,sig,selBr,selFam,_ly,selMos);
      d26=_abfAptSum(abfD,sig,selBr,selFam,_cy,selMos);
    }
    return {l:sig,d25:d25,d26:d26};
  }).filter(function(x){return x.d25||x.d26;});
  sorted.sort(function(a,b){return b.d25-a.d25;});
  barChart('ch-'+mk+'-bar',sorted.map(function(x){return x.l;}),sorted.map(function(x){return x.d25;}),sorted.map(function(x){return x.d26;}));
  if(mk==='DP') brBarChart('ch-'+mk+'-br',mk,selMos,selBr,selApt,selFam);
}
function _setSku(m,mk){_skuMode=m;renderTab(mk);}

// ── INIT ──────────────────────────────────────────────────────────────────────
var TAB_DEFS=[{id:'DF',name:'🛫 Duty Free'},{id:'DP',name:'🏪 Duty Paid'},{id:'STOCK',name:'📦 Stock Analysis'}];
var tabsEl=document.getElementById('tabs');
TAB_DEFS.forEach(function(t){
  var el=document.createElement('div');
  el.className='tab';el.dataset.id=t.id;el.textContent=t.name;
  el.onclick=function(){renderTab(t.id);};
  tabsEl.appendChild(el);
});
renderTab('DF');
</script>
</body>
</html>
