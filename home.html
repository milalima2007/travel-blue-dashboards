<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Travel Blue | Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- TOPBAR (full navigation) -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="8" fill="#1B2A6B"/>
        <path d="M10 34 Q16 10 24 24 Q32 38 38 14" stroke="#FFC72C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <circle cx="38" cy="14" r="2.5" fill="#FFC72C"/>
      </svg>
      <div class="logo-text-wrap">
        <span class="logo-brand">Travel Blue</span>
        <span class="logo-tagline">London · Since 1987</span>
      </div>
    </div>

    <nav class="topbar-nav">
      <a href="/home.html" class="active">Home</a>
      <div class="nav-dropdown" id="nav-projects-dropdown">
        <div class="nav-dropdown-btn">
          Projects
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="nav-dropdown-menu" id="nav-projects-menu"></div>
      </div>
      <div class="nav-dropdown" id="nav-admin-dropdown" style="display:none;">
        <div class="nav-dropdown-btn">
          Admin
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="nav-dropdown-menu">
          <a href="/admin/index.html?tab=users"><span class="menu-icon">👥</span> User Management</a>
          <div id="nav-projects-admin-link" style="display:none;">
            <a href="/admin/index.html?tab=projects"><span class="menu-icon">📁</span> Projects</a>
          </div>
        </div>
      </div>
    </nav>

    <div class="topbar-search">
      <svg class="topbar-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" class="topbar-search-input" placeholder="Search…" id="topbar-search" />
    </div>

    <div class="topbar-user">
      <div class="user-info">
        <div class="user-name">
          <span id="user-name">—</span>
          <span id="role-badge" class="role-badge" style="display:none;"></span>
        </div>
        <div class="user-email" id="user-email">—</div>
      </div>
      <button class="btn-theme" id="btn-theme" title="Toggle dark mode">🌙</button>
      <button class="btn-logout" data-logout>Sign Out</button>
    </div>
  </header>

  <!-- PAGE BANNER -->
  <section class="page-banner">
    <h1>Dashboard <span>Hub</span></h1>
    <p>Select a project to access its reports and analytics.</p>
  </section>

  <!-- MAIN CONTENT -->
  <main class="main-content">
    <div class="section-header">
      <h2 class="section-title">Available Projects</h2>
      <p class="section-subtitle" id="projects-subtitle">Loading…</p>
    </div>
    <div class="cards-grid" id="cards-grid">
      <!-- Populated dynamically by JS -->
    </div>
  </main>

  <footer class="site-footer">
    © 2026 <span>Travel Blue Ltd.</span> — Internal use only. All rights reserved.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/mock-data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
  <script>
  (async () => {
    const user = await Auth.requireLogin();
    if (!user) return;

    const role = Auth.role(user);

    Auth.renderUser(user, '#user-name', '#user-email');
    Auth.renderRoleBadge(user, '#role-badge');

    /* Show Admin dropdown for owner / admin */
    if (Auth.isAdminOrOwner(user)) {
      document.getElementById('nav-admin-dropdown').style.display = 'flex';
    }
    /* Show Projects sub-link for owner */
    if (Auth.isOwner(user)) {
      document.getElementById('nav-projects-admin-link').style.display = 'block';
    }

    /* Build project cards */
    const projects = MockDB.getProjects(role);
    const grid     = document.getElementById('cards-grid');
    const subtitle = document.getElementById('projects-subtitle');
    const navMenu  = document.getElementById('nav-projects-menu');

    /* Filter what this user is allowed to see */
    const visible = projects.filter(p => {
      if (role === 'owner') return true;
      if (role === 'admin') return p.status === 'active';
      return Auth.canViewProject(user, p.slug);
    });

    subtitle.textContent = visible.length
      ? `${visible.length} project${visible.length > 1 ? 's' : ''} available to you.`
      : 'No projects have been assigned to your account yet.';

    /* Populate navbar dropdown */
    if (visible.length === 0) {
      navMenu.innerHTML = '<div class="dropdown-label">No projects available</div>';
    } else {
      navMenu.innerHTML = visible.map(p => `
        <a href="/${p.slug}/index.html">
          <span class="menu-icon">${p.icon}</span> ${p.name}
          ${p.status === 'draft' ? '<span class="card-draft-badge" style="margin-left:auto;font-size:9px;">Draft</span>' : ''}
        </a>
      `).join('');
    }

    /* Theme toggle */
    document.getElementById('btn-theme').addEventListener('click', () => ThemeToggle.toggle());

    /* Render cards */
    if (visible.length === 0) {
      grid.innerHTML = `
        <div style="grid-column:1/-1;">
          <div class="empty-state">
            <div class="empty-icon">📂</div>
            <p>No projects have been assigned to your account.<br>Please contact your administrator.</p>
          </div>
        </div>`;
    } else {
      grid.innerHTML = visible.map(p => `
        <div class="dash-card">
          <div class="card-accent"></div>
          <div class="card-body">
            <div class="card-icon">${p.icon}</div>
            <h3 class="card-title">${p.name}
              ${p.status === 'draft' ? '<span class="card-draft-badge" style="margin-left:8px;">Draft</span>' : ''}
            </h3>
            <p class="card-description">${p.description}</p>
          </div>
          <div class="card-footer">
            <span class="card-tag">${p.status === 'draft' ? '⚠ Not published' : 'Dashboard'}</span>
            <a href="/${p.slug}/index.html" class="btn-access">
              Open
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>
          </div>
        </div>
      `).join('');
    }
  })();
  </script>
</body>
</html>
