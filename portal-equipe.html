<!DOCTYPE html>
<html lang="es">
<head>
  <script src="/js/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Travel Blue | Portal del Equipo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F4F5F7; color: #222; min-height: 100vh; }

    /* ── LOGIN ── */
    #login-screen {
      display: none; position: fixed; inset: 0;
      background: linear-gradient(135deg, #1B2A6B 0%, #243580 100%);
      align-items: center; justify-content: center; z-index: 999;
    }
    #login-screen.active { display: flex; }
    .login-box {
      background: #fff; border-radius: 20px; padding: 44px 40px;
      width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.18);
    }
    .login-header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .login-header svg { width: 44px; height: 44px; flex-shrink: 0; }
    .login-brand { font-size: 20px; font-weight: 700; color: #1B2A6B; line-height: 1.2; }
    .login-brand small { display: block; font-size: 11px; font-weight: 400; color: #999; }
    .login-box h2 { font-size: 22px; color: #1B2A6B; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 28px; }
    .lf { margin-bottom: 16px; }
    .lf label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    .lf input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #E0E0E0;
      border-radius: 10px; font-size: 14px; color: #222; transition: border-color .15s;
    }
    .lf input:focus { outline: none; border-color: #1B2A6B; }
    .login-btn {
      width: 100%; padding: 13px; background: #1B2A6B; color: #fff;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background .15s;
    }
    .login-btn:hover { background: #253d99; }
    .login-err {
      font-size: 12px; color: #c0392b; margin-top: 12px; display: none;
      padding: 9px 12px; background: #fdf0f0; border-radius: 8px;
    }

    /* ── LOADING ── */
    #loading-screen {
      display: flex; position: fixed; inset: 0;
      background: #F4F5F7; align-items: center; justify-content: center; z-index: 998;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid #ddd;
      border-top-color: #1B2A6B; border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LAYOUT ── */
    #app { display: none; min-height: 100vh; }
    #app.active { display: flex; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 240px; flex-shrink: 0; background: #1B2A6B;
      min-height: 100vh; display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 10px;
      padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .sidebar-logo svg { width: 34px; height: 34px; flex-shrink: 0; }
    .sidebar-logo-text { color: #fff; }
    .sidebar-logo-text strong { display: block; font-size: 15px; font-weight: 700; }
    .sidebar-logo-text span { font-size: 10px; color: rgba(255,255,255,.5); }

    .sidebar-user {
      padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .sidebar-user-name { font-size: 13px; font-weight: 600; color: #fff; }
    .sidebar-user-role { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 2px; }

    .sidebar-nav { flex: 1; padding: 12px 0; }
    .nav-section-label {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,.35);
      text-transform: uppercase; letter-spacing: .08em;
      padding: 14px 20px 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; cursor: pointer; border-radius: 0;
      color: rgba(255,255,255,.65); font-size: 13px; font-weight: 500;
      transition: background .15s, color .15s; border: none; background: none;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-item.active { background: rgba(255,193,44,.15); color: #FFC72C; }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; opacity: .8; }
    .nav-item.active svg { opacity: 1; }

    .sidebar-footer {
      padding: 14px 20px; border-top: 1px solid rgba(255,255,255,.08);
    }
    .btn-logout {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: rgba(255,255,255,.45); cursor: pointer;
      border: none; background: none; padding: 0; transition: color .15s;
    }
    .btn-logout:hover { color: #fff; }
    .btn-logout svg { width: 14px; height: 14px; }

    /* ── MAIN ── */
    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }

    .topbar {
      background: #fff; border-bottom: 1px solid #eee;
      padding: 0 32px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar-title { font-size: 16px; font-weight: 700; color: #1B2A6B; }
    .topbar-sub { font-size: 12px; color: #aaa; margin-top: 1px; }

    .page { padding: 28px 32px; flex: 1; }

    /* ── SECTION HEADER ── */
    .section-head { margin-bottom: 22px; }
    .section-head h2 { font-size: 20px; font-weight: 700; color: #1B2A6B; }
    .section-head p { font-size: 13px; color: #888; margin-top: 4px; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 22px; align-items: center;
    }
    .filter-label { font-size: 11px; color: #999; font-weight: 600; text-transform: uppercase; margin-right: 2px; }
    .chip {
      padding: 5px 13px; font-size: 12px; font-weight: 500; border-radius: 20px;
      border: 1.5px solid #e0e0e0; background: #fff; color: #555;
      cursor: pointer; transition: all .15s;
    }
    .chip.active { background: #1B2A6B; color: #fff; border-color: #1B2A6B; }
    .chip:hover:not(.active) { border-color: #1B2A6B; color: #1B2A6B; }
    .filter-sep { width: 1px; height: 20px; background: #e5e5e5; margin: 0 4px; }

    /* ── REPORT GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
    }
    .rcard {
      background: #fff; border: 1px solid #eee; border-radius: 14px;
      overflow: hidden; transition: box-shadow .15s, transform .15s;
    }
    .rcard:hover { box-shadow: 0 6px 20px rgba(0,0,0,.08); transform: translateY(-1px); }
    .rcard-accent { height: 3px; background: linear-gradient(90deg, #1B2A6B, #FFC72C); }
    .rcard-body { padding: 16px; }
    .rcard-icon { font-size: 24px; margin-bottom: 10px; }
    .rcard-title { font-size: 14px; font-weight: 700; color: #1B2A6B; margin-bottom: 4px; }
    .rcard-desc { font-size: 12px; color: #888; line-height: 1.5; margin-bottom: 10px; }
    .rcard-links { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px; }
    .rcard-links a { font-size: 11px; color: #1B2A6B; font-weight: 600; text-decoration: none; }
    .rcard-links a:hover { text-decoration: underline; }
    .rcard-meta { font-size: 11px; color: #bbb; }
    .rcard-footer {
      padding: 10px 16px; border-top: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .badge-row { display: flex; gap: 6px; align-items: center; }
    .badge {
      font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 5px;
    }
    .badge-html { background: #EEF2FF; color: #3730A3; }
    .badge-bi   { background: #FFF7ED; color: #C2410C; }
    .badge-region { background: #F0F9F4; color: #166534; }
    .btn-open {
      padding: 6px 16px; background: #1B2A6B; color: #fff;
      border-radius: 7px; font-size: 12px; font-weight: 600;
      text-decoration: none; transition: background .15s;
    }
    .btn-open:hover { background: #253d99; }
    .no-results {
      grid-column: 1/-1; text-align: center; padding: 56px 32px;
      color: #bbb; font-size: 14px;
    }

    /* ── TABLE ── */
    .table-card {
      background: #fff; border: 1px solid #eee; border-radius: 14px; overflow: hidden;
    }
    .table-card table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .table-card th {
      text-align: left; padding: 12px 16px; border-bottom: 1.5px solid #f0f0f0;
      font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: .05em;
    }
    .table-card td { padding: 13px 16px; border-bottom: 1px solid #f8f8f8; color: #333; vertical-align: middle; }
    .table-card tr:last-child td { border-bottom: none; }
    .table-card tr:hover td { background: #fafafa; }

    /* ── STATUS PILLS ── */
    .pill {
      display: inline-block; font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 12px;
    }
    .pill-done    { background: #EEF2FF; color: #3730A3; }
    .pill-ok      { background: #F0FDF4; color: #166534; }
    .pill-risk    { background: #FFF7ED; color: #C2410C; }
    .pill-pending { background: #F5F5F5; color: #888; }
    .pill-all     { background: #EEF2FF; color: #3730A3; }
    .pill-brasil  { background: #dcfce7; color: #166534; }
    .pill-mexico  { background: #FFF7ED; color: #C2410C; }

    /* ── AVATAR ── */
    .avatar {
      display: inline-flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%; font-size: 11px;
      font-weight: 700; margin-right: 8px; vertical-align: middle; flex-shrink: 0;
    }
    .av-navy   { background: #EEF2FF; color: #1B2A6B; }
    .av-green  { background: #F0FDF4; color: #166534; }
    .av-orange { background: #FFF7ED; color: #C2410C; }
    .av-purple { background: #F5F3FF; color: #6D28D9; }
    .name-cell { display: flex; align-items: center; }

    /* ── ACCESOS CARD ── */
    .access-card {
      background: #fff; border: 1px solid #eee; border-radius: 14px;
      padding: 20px 24px; margin-bottom: 12px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px;
    }
    .access-info strong { font-size: 14px; color: #1B2A6B; }
    .access-info span { display: block; font-size: 12px; color: #888; margin-top: 2px; }
    .access-cred { text-align: right; }
    .access-cred code {
      background: #F4F5F7; border: 1px solid #e8e8e8; padding: 4px 10px;
      border-radius: 6px; font-size: 12px; color: #333; font-family: monospace;
    }
    .access-cred small { display: block; font-size: 10px; color: #bbb; margin-top: 4px; }

    /* ── REGION GROUP ── */
    .region-group { margin-bottom: 30px; }
    .region-group-title {
      font-size: 13px; font-weight: 700; color: #999;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
    }
    .region-group-title::after {
      content: ''; flex: 1; height: 1px; background: #eee;
    }

    /* ── RESTRICTED ── */
    .restricted {
      text-align: center; padding: 80px 32px; color: #ccc;
    }
    .restricted svg { width: 48px; height: 48px; margin: 0 auto 16px; display: block; opacity: .3; }
    .restricted p { font-size: 15px; color: #bbb; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar-logo-text, .nav-item span, .sidebar-user, .nav-section-label, .sidebar-footer span { display: none; }
      .nav-item { justify-content: center; padding: 12px; }
      .page { padding: 20px 16px; }
      .topbar { padding: 0 16px; }
    }
  </style>
</head>

function buildCard(r) {
  var links = '';
  for (var i=0; i<r.sublinks.length; i++) {
    links += '<a href="'+r.sublinks[i].h+'" target="_blank">→ '+r.sublinks[i].n+'</a>';
  }
  return '<div class="rcard">'
    +'<div class="rcard-accent"></div>'
    +'<div class="rcard-body">'
    +'<div class="rcard-icon">'+r.icon+'</div>'
    +'<div class="rcard-title">'+r.name+'</div>'
    +'<div class="rcard-desc">'+r.desc+'</div>'
    +(links ? '<div class="rcard-links">'+links+'</div>' : '')
    +'<div class="rcard-meta">Frecuencia: '+r.freq+'</div>'
    +'</div>'
    +'<div class="rcard-footer">'
    +'<div class="badge-row"><span class="badge badge-'+(r.type==='BI'?'bi':'html')+'">'+r.type+'</span><span class="badge badge-region">'+r.label+'</span></div>'
    +'<a href="'+r.href+'" target="_blank" class="btn-open">Abrir</a>'
    +'</div></div>';
}

function renderGrid(reports) {
  if (!reports.length) return '<div class="no-results">No hay reportes para los filtros seleccionados.</div>';
  var h = '';
  for (var i=0; i<reports.length; i++) h += buildCard(reports[i]);
  return h;
}

function filterBar(regionLabel) {
  var freqs = ['Mensual','Diario'];
  var chips_t = '<span class="filter-label">Tema:</span>'
    +'<button class="chip active" data-ft="theme" data-fv="all">Todos</button>';
  for (var i=0; i<THEMES.length; i++) {
    chips_t += '<button class="chip" data-ft="theme" data-fv="'+THEMES[i]+'">'+THEME_LABEL[THEMES[i]]+'</button>';
  }
  var chips_f = '<div class="filter-sep"></div><span class="filter-label">Frecuencia:</span>'
    +'<button class="chip active" data-ft="freq" data-fv="all">Todas</button>';
  for (var j=0; j<freqs.length; j++) {
    chips_f += '<button class="chip" data-ft="freq" data-fv="'+freqs[j]+'">'+freqs[j]+'</button>';
  }
  return '<div class="filter-bar">'+chips_t+chips_f+'</div>';
}

function filterMatch(r) {

var currentPage = 'reportes-latam';

function navigate(page) {
  currentPage = page;
  var p = PAGES[page];
  if (!p) return;
  document.getElementById('topbar-title').textContent = p.title;
  document.getElementById('topbar-sub').textContent = p.sub;
  document.getElementById('page-content').innerHTML = p.render();
  document.querySelectorAll('.nav-item').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.page === page);
  });
  // Bind filter chips
  document.querySelectorAll('.chip[data-ft]').forEach(function(chip){
    chip.addEventListener('click', function(){
      var ft = chip.dataset.ft;
      document.querySelectorAll('.chip[data-ft="'+ft+'"]').forEach(function(c){ c.classList.remove('active'); });
      chip.classList.add('active');
      activeFilters[ft] = chip.dataset.fv;
      var grid = document.getElementById('report-grid');
      if (grid) grid.innerHTML = renderGrid(getFilteredReports(page));
    });
  });
}

function getFilteredReports(page) {
  if (page === 'reportes-latam')   return REPORTS.filter(function(r){ return r.region==='latam' && canSee(r) && filterMatch(r); });
  if (page === 'reportes-global')  return REPORTS.filter(function(r){ return r.region==='global' && r.type==='HTML' && filterMatch(r); });
  if (page === 'reportes-bi')      return REPORTS.filter(function(r){ return r.type==='BI' && filterMatch(r); });
  return [];
}

(async function(){
  var loading = document.getElementById('loading-screen');
  var loginScreen = document.getElementById('login-screen');
  var app = document.getElementById('app');

  var res = await sb.auth.getUser();
  var user = res.data && res.data.user;

  loading.style.display = 'none';

  if (!user) {
    loginScreen.classList.add('active');
    setupLogin();
    return;
  }
  showApp(user);
})();

function setupLogin() {
  var btn = document.getElementById('login-btn');
  var err = document.getElementById('login-err');

  async function doLogin() {
    var email = document.getElementById('login-email').value.trim();
    var pwd   = document.getElementById('login-password').value;
    btn.textContent = 'Ingresando…'; btn.disabled = true; err.style.display = 'none';
    var res = await sb.auth.signInWithPassword({ email: email, password: pwd });
    if (res.error) {
      err.textContent = /invalid/i.test(res.error.message) ? 'Correo o contraseña incorrectos.' : res.error.message;
      err.style.display = 'block';
      btn.textContent = 'Ingresar'; btn.disabled = false;
      return;
    }
    document.getElementById('login-screen').classList.remove('active');
    showApp(res.data.user);
  }

  btn.addEventListener('click', doLogin);
  document.getElementById('login-password').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
}

function showApp(user) {
  var email = user.email.toLowerCase();
  var profile = USER_PROFILES[email];

  if (!profile) {
    document.getElementById('login-screen').classList.add('active');
    document.getElementById('login-err').textContent = 'Tu correo no tiene acceso. Contacta a Camila.';
    document.getElementById('login-err').style.display = 'block';
    return;
  }

  currentProfile = profile;
  document.getElementById('sb-user-name').textContent = profile.name;
  document.getElementById('sb-user-role').textContent = profile.role;
  document.getElementById('app').classList.add('active');

  if (profile.admin) {
    document.getElementById('nav-label-admin').style.display = 'block';
    document.getElementById('nav-actividades').style.display = 'flex';
    document.getElementById('nav-equipo').style.display = 'flex';
    document.getElementById('nav-accesos').style.display = 'flex';
  }

  // Nav clicks
  document.querySelectorAll('.nav-item[data-page]').forEach(function(btn){
    btn.addEventListener('click', function(){ navigate(btn.dataset.page); });
  });

  // Logout
  document.getElementById('btn-logout').addEventListener('click', async function(){
    await sb.auth.signOut();
    window.location.reload();
  });

  // Determine start page by access
  var startPage = 'reportes-latam';
  if (profile.access !== 'all' && profile.access.indexOf('brasil') === -1 && profile.access.indexOf('latam') === -1) {
    startPage = 'reportes-latam'; // Mexico users still see LATAM tab (filtered)
  }
  navigate(startPage);
}
</script>
</body>
</html>
