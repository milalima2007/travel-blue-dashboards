<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contas a Receber – Travel Blue</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#0a0e1a;--card:#111827;--border:#1e293b;--text:#e2e8f0;--dim:#64748b;
  --accent:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;
  --c0:#ef4444;--c1:#f97316;--c2:#eab308;--c3:#a855f7;--c4:#64748b;}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;line-height:1.5}
/* ── PASSWORD ── */
#pw-overlay{position:fixed;inset:0;background:#0a0e1a;display:flex;align-items:center;justify-content:center;z-index:9999;}
.pw-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:44px 40px;text-align:center;width:340px;box-shadow:0 8px 40px rgba(0,0,0,.6);}
.pw-title{font-size:17px;font-weight:700;margin-bottom:5px;}
.pw-sub{font-size:12px;color:var(--dim);margin-bottom:26px;}
.pw-inp{width:100%;background:#0a0e1a;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;padding:10px 14px;margin-bottom:10px;outline:none;text-align:center;letter-spacing:3px;}
.pw-inp:focus{border-color:var(--accent);}
.pw-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;font-size:13px;font-weight:700;padding:10px;cursor:pointer;}
.pw-btn:hover{background:#d97706;}
.pw-err{color:var(--red);font-size:12px;margin-top:10px;min-height:16px;}
.pw-fs{position:absolute;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;padding:5px 8px;font-size:11px;display:flex;align-items:center;gap:4px;}
.pw-fs:hover{color:var(--text);border-color:var(--dim);}
.fs-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--dim);cursor:pointer;padding:4px 8px;font-size:11px;display:flex;align-items:center;gap:4px;}
.fs-btn:hover{color:var(--accent);border-color:var(--accent);}
/* ── HEADER ── */
.header{background:linear-gradient(135deg,#111827 0%,#1e293b 100%);padding:14px 24px;border-bottom:2px solid var(--accent);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-text .brand{font-size:17px;font-weight:700;color:#fff;display:block;}
.logo-text .sub{font-size:11px;color:var(--dim);}
.header-right{text-align:right;font-size:11px;color:var(--dim);}
/* ── TABS ── */
.tabs{display:flex;gap:2px;padding:6px 16px;background:#0f172a;overflow-x:auto;}
.tab{padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;color:var(--dim);white-space:nowrap;transition:all .2s;border:none;background:none;}
.tab:hover{color:var(--text);background:#1e293b;}
.tab.active{color:var(--accent);background:var(--card);border-top:2px solid var(--accent);}
/* ── KPIs ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-align:center;}
.kpi .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;}
.kpi .val{font-size:20px;font-weight:800;color:var(--accent);margin:4px 0;}
.kpi .cnt{font-size:11px;color:var(--dim);}
/* ── CONTENT ── */
.content{padding:16px 24px;max-width:1600px;margin:0 auto;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:16px;}
/* ── FILTER BAR ── */
.fbar{background:#0f172a;border:1px solid var(--border);border-radius:8px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px;}
.fbar-reset{padding:5px 12px;border-radius:6px;background:#1e293b;border:1px solid var(--border);color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;}
.fbar-reset:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.fbar-hum{padding:5px 12px;border-radius:6px;background:#0f172a;border:1px solid #06b6d433;color:#06b6d4;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s;}
.fbar-hum:hover,.fbar-hum.hum-on{background:#06b6d420;border-color:#06b6d4;}
.fbar-search{background:#111827;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;padding:5px 10px;min-width:180px;flex:1 1 180px;}
.fbar-search:focus{outline:none;border-color:var(--accent);}
.fbar-search::placeholder{color:var(--dim);}
/* ── MULTI-SELECT DROPDOWN ── */
.ms-wrap{position:relative;flex:1 1 160px;max-width:240px;}
.ms-btn{width:100%;background:#111827;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;padding:5px 10px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;gap:4px;white-space:nowrap;overflow:hidden;}
.ms-btn.has-sel{border-color:var(--accent);color:var(--accent);}
.ms-btn:hover{border-color:var(--dim);}
.ms-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:220px;width:max-content;max-width:320px;background:#111827;border:1px solid var(--border);border-radius:8px;z-index:500;box-shadow:0 8px 24px rgba(0,0,0,.7);padding:8px;}
.ms-search{width:100%;background:#0a0e1a;border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:4px 8px;margin-bottom:6px;outline:none;}
.ms-search:focus{border-color:var(--accent);}
.ms-opts{max-height:200px;overflow-y:auto;}
.ms-opt{display:flex;align-items:center;gap:7px;padding:4px 6px;cursor:pointer;border-radius:4px;font-size:11px;color:var(--text);user-select:none;}
.ms-opt:hover{background:#1e293b;}
.ms-opt input[type=checkbox]{accent-color:var(--accent);cursor:pointer;width:13px;height:13px;flex-shrink:0;}
.ms-sep{border:none;border-top:1px solid var(--border);margin:5px 0;}
/* ── VIEW BUTTONS ── */
.vbtns{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.vb{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;background:#1e293b;border:1px solid var(--border);color:var(--dim);transition:all .15s;}
.vb:hover{color:var(--text);}
.vb.act-d{background:#ef444422;color:var(--red);border-color:var(--red);}
.vb.act-h{background:#f59e0b22;color:var(--accent);border-color:var(--accent);}
.vb.act-f{background:#10b98122;color:var(--green);border-color:var(--green);}
.vb.act-r{background:#3b82f622;color:var(--blue);border-color:var(--blue);}
/* ── PERIOD CARDS ── */
.period-grid{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;}
.pc{flex:1 1 150px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:transform .15s,box-shadow .15s;border-left:3px solid;}
.pc:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.4);}
.pc.sel{box-shadow:0 0 0 2px var(--accent);}
.pc .pcl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.pc .pcc{font-size:11px;color:var(--dim);margin:3px 0;}
.pc .pcv{font-size:16px;font-weight:800;}
.pc .pcsub{font-size:10px;color:var(--dim);margin-top:2px;}
/* ── RECEBIDOS CARDS ── */
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px;}
.rec-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;border-left:3px solid;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.rec-card:hover{transform:translateY(-2px);}
.rec-card .rc-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.rec-card .rc-val{font-size:18px;font-weight:800;margin-bottom:3px;}
.rec-card .rc-cnt{font-size:11px;color:var(--dim);}
/* ── TABLES ── */
.tbl-hdr{display:flex;justify-content:flex-end;margin-bottom:5px;}
.dl-btn{background:#1e293b;border:1px solid var(--border);border-radius:6px;color:var(--dim);font-size:11px;padding:4px 12px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
.dl-btn:hover{background:var(--green);color:#000;border-color:var(--green);}
.tbl-wrap{overflow-x:auto;}
table.dt{width:100%;border-collapse:collapse;font-size:11px;}
table.dt th{text-align:left;padding:5px 8px;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:700;font-size:10px;text-transform:uppercase;cursor:pointer;white-space:nowrap;user-select:none;position:sticky;top:0;background:var(--card);z-index:1;}
table.dt th:hover{color:#fff;}
table.dt td{padding:4px 8px;border-bottom:1px solid #1e293b;white-space:nowrap;}
table.dt td.cell-wrap{white-space:normal;min-width:90px;max-width:180px;overflow-wrap:break-word;line-height:1.35;}
table.dt td.cell-sm{white-space:normal;min-width:70px;max-width:120px;overflow-wrap:break-word;line-height:1.35;}
table.dt tr:hover td{background:#1e293b55;}
table.dt tr.tot td{background:#1e293b;font-weight:700;border-top:2px solid var(--accent);color:var(--accent);}
.nr{text-align:right;white-space:nowrap;}
.sa{font-size:10px;margin-left:3px;opacity:.5;}
/* ── MISC ── */
.badge-p{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.bp0{background:#ef444422;color:var(--c0);}
.bp1{background:#f9731622;color:var(--c1);}
.bp2{background:#eab30822;color:var(--c2);}
.bp3{background:#a855f722;color:var(--c3);}
.bp4{background:#64748b22;color:var(--c4);}
.wk{display:inline-block;background:#3b82f622;color:var(--blue);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.cnt-badge{background:#f59e0b22;color:var(--accent);border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;}
.section-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.empty{text-align:center;color:var(--dim);padding:32px 0;}
.nowrap{white-space:nowrap;}
footer{text-align:center;color:var(--dim);font-size:11px;padding:16px;border-top:1px solid var(--border);margin-top:8px;}
/* ── OVERVIEW ── */
.ov-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.ov-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
.ov-bottom{display:grid;grid-template-columns:1fr 2fr;gap:16px;}
.ov-panel{background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:16px;}
.ov-panel-full{grid-column:1/-1;}
.ov-panel-title{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:14px;}
.ov-prog-item{margin-bottom:12px;}
.ov-prog-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px;}
.ov-prog-bar{background:#1e293b;border-radius:4px;height:8px;overflow:hidden;}
.ov-prog-fill{height:100%;border-radius:4px;transition:width .6s;}
.ov-prog-sub{font-size:10px;color:var(--dim);margin-top:2px;}
/* ── ANNUAL TABLE ── */
.dt-anual .sc{position:sticky;left:0;background:var(--card);z-index:2;}
.dt-anual thead th.sc{z-index:3;background:var(--card);}
.dt-anual .mp{color:#10b981;}.dt-anual .mf{color:#ef4444;}.dt-anual .mz{color:var(--dim);}
table.dt-anual td{padding:3px 6px;font-size:10px;white-space:nowrap;}
table.dt-anual th{padding:4px 6px;font-size:10px;white-space:nowrap;}
.anual-scroll-top{overflow-x:auto;overflow-y:hidden;height:14px;margin-bottom:2px;}
.anual-scroll-top>div{height:1px;}
/* ── HISTÓRICO ── */
.hist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px;}
.hist-card{background:#0f172a;border:1px solid var(--border);border-radius:8px;padding:14px 12px;cursor:pointer;transition:border-color .15s;}
.hist-card:hover,.hist-card-sel{border-color:var(--accent);}
.hist-duo{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0 6px;}
.hist-cell{background:var(--card);border-radius:5px;padding:7px 8px;}
.hist-cell-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.hist-cell-val{font-size:13px;font-weight:700;}
.hist-detail{margin-top:16px;background:#0f172a;border:1px solid var(--border);border-radius:10px;padding:18px;}
@media(max-width:768px){.kpi-row{grid-template-columns:repeat(2,1fr);}.pc{flex:1 1 130px;}.rec-grid{grid-template-columns:repeat(2,1fr);}.ov-kpi-row{grid-template-columns:repeat(2,1fr);}.ov-charts{grid-template-columns:1fr;}.ov-bottom{grid-template-columns:1fr;}}
</style>
</head>

const SS={};
function sortTbl(id,ci){
  const t=document.getElementById(id);if(!t)return;
  const prev=SS[id]||{c:-1,a:true};
  const asc=prev.c===ci?!prev.a:true;
  SS[id]={c:ci,a:asc};
  const tb=t.querySelector('tbody');
  const rows=[...tb.querySelectorAll('tr:not(.tot)')];
  rows.sort((a,b)=>{
    const av=a.cells[ci]?.dataset.v??'',bv=b.cells[ci]?.dataset.v??'';
    const an=parseFloat(av),bn=parseFloat(bv);
    const cmp=(!isNaN(an)&&!isNaN(bn))?(an-bn):av.localeCompare(bv,'pt-BR');
    return asc?cmp:-cmp;
  });
  rows.forEach(r=>tb.appendChild(r));
  t.querySelectorAll('thead th').forEach((th,i)=>{
    const s=th.querySelector('.sa');if(s) s.textContent=i===ci?(asc?'▲':'▼'):'⇅';
  });
}
function TH(l,i,id){return '<th onclick="sortTbl(\''+id+'\','+i+')">'+esc(l)+' <span class="sa">⇅</span></th>';}

  const tot=tv+th2+tf;
  const ks=[

    {l:'Vence Hoje',v:BRL(th2),c:'#f59e0b',n:D.hoje.length},

    {l:'Total Geral',v:BRL(tot),c:'#3b82f6',n:D.vencidas.length+D.hoje.length+D.futuras.length},
  ];
  if(IS_OV){
    const pct=tot>0?(tv/tot*100).toFixed(1):'0.0';
    const crit=D.vencidas.filter(r=>(parseInt(r.Dias_Atraso)||0)>90);
    const dist_cli=Object.keys(grp(D.vencidas,'CNPJ_CPF')).length;
    ks.push(
      {l:'% Carteira Vencida',v:pct+'%',c:'#f97316',sub:'do total a receber'},
      {l:'Crítico (+90 dias)',v:BRL(sum(crit,'A_Receber')),c:'#a855f7',n:crit.length},
      {l:'Clientes Vencidos',v:FN(dist_cli),c:'#3b82f6',sub:'CNPJs distintos'},
    );
  }
  const el=document.getElementById('kpis');
  if(IS_OV) el.style.gridTemplateColumns='repeat(7,1fr)';
  el.innerHTML=ks.map(k=>
    '<div class="kpi"><div class="lbl">'+k.l+'</div><div class="val" style="color:'+k.c+'">'+k.v+'</div><div class="cnt">'+(k.sub!=null?k.sub:(FN(k.n)+' título'+(k.n!==1?'s':'')))+'</div></div>'
  ).join('');
}

/* ── FILTER HELPERS ── */
function _src(sec){return sec==='vencidas'?D.vencidas:sec==='hoje'?D.hoje:sec==='futuras'?D.futuras:D.recebidos;}
function _field(key){return {vendedor:'Vendedor',cliente:'Nome_Fantasia',gerente:'Gerente',cli_agrupado:'Cliente_Agrupado',periodo:'Periodo',semana:'Semana',cat:'Cat_Receb'}[key]||key;}

function applyF(data,sec){
  const f=F[sec],q=(f.search||'').toLowerCase().trim();
  return data.filter(r=>{
    if(f.periodo?.length&&!f.periodo.includes(r.Periodo)) return false;
    if(f.semana?.length&&!f.semana.includes(r.Semana)) return false;
    if(f.vendedor?.length&&!f.vendedor.includes(r.Vendedor)) return false;
    if(f.cliente?.length&&!f.cliente.includes(r.Nome_Fantasia)) return false;
    if(f.cat?.length&&!f.cat.includes(r.Cat_Receb)) return false;
    if(f.gerente?.length&&!f.gerente.includes(r.Gerente)) return false;
    if(f.cli_agrupado?.length&&!f.cli_agrupado.includes(r.Cliente_Agrupado)) return false;
    if(f.hum&&r.Cobranca!=='Humanize') return false;
    if(q){const hay=[r.Razao_Social,r.Nome_Fantasia,r.Vendedor,String(r.Nota_Fiscal||''),r.CNPJ_CPF,r.Gerente,r.Cliente_Agrupado].map(x=>String(x||'').toLowerCase()).join(' ');if(!hay.includes(q)) return false;}
    return true;
  });
}
function avail(allData,rowField,f,selfKey){
  const filterRow=r=>{
    if(f.periodo?.length&&selfKey!=='periodo'&&!f.periodo.includes(r.Periodo)) return false;
    if(f.semana?.length&&selfKey!=='semana'&&!f.semana.includes(r.Semana)) return false;
    if(f.vendedor?.length&&selfKey!=='vendedor'&&!f.vendedor.includes(r.Vendedor)) return false;
    if(f.cliente?.length&&selfKey!=='cliente'&&!f.cliente.includes(r.Nome_Fantasia)) return false;
    if(f.cat?.length&&selfKey!=='cat'&&!f.cat.includes(r.Cat_Receb)) return false;
    if(f.gerente?.length&&selfKey!=='gerente'&&!f.gerente.includes(r.Gerente)) return false;
    if(f.cli_agrupado?.length&&selfKey!=='cli_agrupado'&&!f.cli_agrupado.includes(r.Cliente_Agrupado)) return false;
    if(f.hum&&r.Cobranca!=='Humanize') return false;
    const q=(f.search||'').toLowerCase().trim();
    if(q){const hay=[r.Razao_Social,r.Nome_Fantasia,r.Vendedor,String(r.Nota_Fiscal||''),r.CNPJ_CPF,r.Gerente,r.Cliente_Agrupado].map(x=>String(x||'').toLowerCase()).join(' ');if(!hay.includes(q)) return false;}
    return true;
  };
  const vals=new Set();
  allData.filter(filterRow).forEach(r=>{const v=r[rowField];if(v!==undefined&&v!==''&&String(v)!=='nan') vals.add(String(v));});
  return [...vals].sort((a,b)=>a.localeCompare(b,'pt-BR'));
}
function _cascade(sec,changedKey){
  if(sec==='anual') return;
  const src=_src(sec);
  ['vendedor','cliente','gerente','cli_agrupado','periodo','semana'].forEach(k=>{
    if(k===changedKey||F[sec][k]===undefined) return;
    const av=avail(src,_field(k),F[sec],k);
    F[sec][k]=F[sec][k].filter(v=>av.includes(v));
  });
}

/* ── MULTI-SELECT ── */
const _msSt={};
function msPanelToggle(id,e){
  if(e) e.stopPropagation();
  _msSt[id]=_msSt[id]||{};
  const nowOpen=!_msSt[id].open;
  Object.keys(_msSt).forEach(k=>{_msSt[k]=_msSt[k]||{};_msSt[k].open=false;});
  _msSt[id].open=nowOpen;
  _applyMS();
}
function msPanelSearch(id,q,e){
  if(e) e.stopPropagation();
  _msSt[id]=_msSt[id]||{};_msSt[id].q=q;
  document.querySelectorAll('[data-msopt="'+id+'"]').forEach(o=>{
    o.style.display=(!q||(o.dataset.val||'').toLowerCase().includes(q.toLowerCase()))?'':'none';
  });
}
function _applyMS(){
  Object.entries(_msSt).forEach(([id,st])=>{
    const p=document.getElementById('msp_'+id);
    if(p) p.style.display=st.open?'block':'none';
    if(st.q){const inp=document.getElementById('msi_'+id);if(inp){inp.value=st.q;msPanelSearch(id,st.q);}}
  });
  // indeterminate
  document.querySelectorAll('[data-msall]').forEach(cb=>{
    const id=cb.dataset.msall;
    const parts=id.match(/^(.+?)_([^_]+)$/);if(!parts) return;
    const sec=parts[1],key=parts[2];
    if(F[sec]&&F[sec][key]!==undefined){
      const sel=F[sec][key];
      const total=document.querySelectorAll('[data-msopt="'+id+'"]').length;
      cb.checked=sel.length>0&&sel.length>=total;
      cb.indeterminate=sel.length>0&&sel.length<total;
    }
  });
  _addDualScroll();
}
function _addDualScroll(){
  document.querySelectorAll('.tbl-wrap').forEach(bot=>{
    if(bot.dataset.scrollSynced) return;
    if(bot.id==='aw_bot') return; // já tem scroll próprio
    bot.dataset.scrollSynced='1';
    const top=document.createElement('div');
    top.style.cssText='overflow-x:auto;overflow-y:hidden;height:14px;margin-bottom:2px;';
    const inner=document.createElement('div');inner.style.height='1px';
    top.appendChild(inner);
    bot.parentNode.insertBefore(top,bot);
    let _sy=false;
    top.addEventListener('scroll',()=>{if(!_sy){_sy=true;bot.scrollLeft=top.scrollLeft;_sy=false;}});
    bot.addEventListener('scroll',()=>{if(!_sy){_sy=true;top.scrollLeft=bot.scrollLeft;_sy=false;}});
    setTimeout(()=>{inner.style.width=bot.scrollWidth+'px';},60);
  });
}

/* ── DOWNLOAD EXCEL ── */
function downloadXLSX(tableId,fname){
  if(typeof XLSX==='undefined'){alert('Biblioteca Excel não carregada. Verifique sua conexão.');return;}
  const t=document.getElementById(tableId);if(!t) return;
  const wb=XLSX.utils.book_new();
  // Build data array from table, using data-v for numeric cells
  const rowEls=[...t.querySelectorAll('tr')];
  const aoa=rowEls.map(r=>[...r.querySelectorAll('th,td')].map(c=>{
    const raw=c.dataset.v;
    if(raw!==undefined&&raw!==''){const n=parseFloat(raw);return isNaN(n)?raw:n;}
    return c.textContent.trim();
  }));
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  // Handle merged cells from colspan/rowspan
  const merges=[];
  let rIdx=0;
  rowEls.forEach(r=>{
    let cIdx=0;
    [...r.querySelectorAll('th,td')].forEach(c=>{
      const cs=parseInt(c.getAttribute('colspan')||1);
      const rs=parseInt(c.getAttribute('rowspan')||1);
      if(cs>1||rs>1) merges.push({s:{r:rIdx,c:cIdx},e:{r:rIdx+rs-1,c:cIdx+cs-1}});
      cIdx+=cs;
    });
    rIdx++;
  });
  if(merges.length) ws['!merges']=merges;
  // Auto column widths
  const range=XLSX.utils.decode_range(ws['!ref']||'A1');
  const colW=[];
  for(let C=range.s.c;C<=range.e.c;C++){
    let max=8;
    for(let R=range.s.r;R<=range.e.r;R++){
      const cell=ws[XLSX.utils.encode_cell({r:R,c:C})];
      if(cell&&cell.v!=null){const l=String(cell.v).length;if(l>max)max=l;}
    }
    colW.push({wch:Math.min(max+2,42)});
  }
  ws['!cols']=colW;
  XLSX.utils.book_append_sheet(wb,ws,'Dados');
  XLSX.writeFile(wb,(fname||tableId)+'.xlsx');
}
function dlBtn(id,fname){
  return '<div class="tbl-hdr"><button class="dl-btn" onclick="downloadXLSX(\''+id+'\',\''+fname+'\')"><i class="bi bi-file-earmark-excel"></i> Excel</button></div>';
}

/* ── TABLE BUILDERS ── */
function buildDetalhe(rows,id,cols,hdrs){
  if(_hideCols.size){const ki=cols.map((c,i)=>_hideCols.has(c)?-1:i).filter(i=>i>=0);cols=ki.map(i=>cols[i]);hdrs=ki.map(i=>hdrs[i]);}
  const ths=hdrs.map((h,i)=>TH(h,i,id)).join('');
  const trs=rows.map(r=>{
    const tds=cols.map(c=>{
      const v=r[c];const isN=NUM_COLS.has(c);
      let disp=v===''||v===null||v===undefined?'—':v;
      if(CURRENCY_COLS.has(c)&&typeof v==='number') disp=BRL(v);
      // Período: show only the part before '(' — keep full name for cards only
      if(c==='Periodo'&&typeof disp==='string') disp=disp.replace(/\s*\(.*\)\s*$/,'').trim()||disp;
      const dv=isN?(parseFloat(v)||0):esc(String(v??''));
      // Special badge for Cobranca column
      if(c==='Cobranca'){
        const cv=String(v||'').trim();
        const badge=cv==='Humanize'
          ?'<span style="background:#06b6d422;color:#06b6d4;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap">🏢 Humanize</span>'
          :'<span style="color:var(--dim);font-size:10px">—</span>';
        return '<td data-v="'+esc(cv)+'">'+badge+'</td>';
      }
      const WRAP_LG=new Set(['Nome_Fantasia','Razao_Social','Cliente_Agrupado','Cidade']);
      const WRAP_SM=new Set(['Gerente','Vendedor']);
      const cls=(isN?'nr':WRAP_LG.has(c)?'cell-wrap':WRAP_SM.has(c)?'cell-sm':'')+(c==='CNPJ_CPF'?' nowrap':'');
      return '<td class="'+cls+'" data-v="'+dv+'">'+esc(String(disp??''))+'</td>';
    }).join('');
    return '<tr>'+tds+'</tr>';
  }).join('');
  const totTds=cols.map((c,i)=>{
    if(CURRENCY_COLS.has(c)) return '<td class="nr">'+BRL(sum(rows,c))+'</td>';
    if(i===0) return '<td>TOTAL ('+FN(rows.length)+' títulos)</td>';
    return '<td></td>';
  }).join('');
  return dlBtn(id,'detalhado')
    +'<div class="tbl-wrap"><table class="dt" id="'+id+'">'
    +'<thead><tr>'+ths+'</tr></thead>'
    +'<tbody>'+trs+'<tr class="tot">'+totTds+'</tr></tbody>'
    +'</table></div>';
}

function _buildAgg(rows,id,grpKey,grpLbl,valKey,valLbl,extra){
  const g=grp(rows,grpKey);
  const rws=Object.entries(g).map(([k,rs])=>{
    const obj={k,n:rs.length,t:sum(rs,valKey)};
    if(extra==='cnpj') obj.cnpj=rs[0].CNPJ_CPF||'';
    return obj;
  }).sort((a,b)=>b.t-a.t);
  const hasCnpj=extra==='cnpj';
  const cols=hasCnpj?[grpLbl,'CNPJ','Títulos',valLbl]:[grpLbl,'Títulos',valLbl];
  const ths=cols.map((h,i)=>TH(h,i,id)).join('');
  const trs=rws.map(r=>{
    let cells='<td data-v="'+esc(r.k)+'">'+esc(r.k)+'</td>';
    if(hasCnpj) cells+='<td class="nowrap" data-v="'+esc(r.cnpj)+'">'+esc(r.cnpj)+'</td>';
    cells+='<td class="nr" data-v="'+r.n+'">'+FN(r.n)+'</td>'
      +'<td class="nr" data-v="'+r.t+'">'+BRL(r.t)+'</td>';
    return '<tr>'+cells+'</tr>';
  }).join('');
  const totN=rws.reduce((s,r)=>s+r.n,0);
  const totT=sum(rws,'t');
  let totRow='<td>TOTAL ('+FN(rws.length)+' '+grpLbl.toLowerCase()+')</td>';
  if(hasCnpj) totRow+='<td></td>';
  totRow+='<td class="nr">'+FN(totN)+'</td><td class="nr">'+BRL(totT)+'</td>';
  return dlBtn(id,grpKey.toLowerCase())
    +'<div class="tbl-wrap"><table class="dt" id="'+id+'">'
    +'<thead><tr>'+ths+'</tr></thead>'
    +'<tbody>'+trs+'<tr class="tot">'+totRow+'</tr></tbody>'
    +'</table></div>';
}
function buildByCliente(data,pfx,vk,vl){vk=vk||'A_Receber';vl=vl||'Valor a Receber';return _buildAgg(data,pfx+'_cli','Nome_Fantasia','Cliente',vk,vl,'cnpj');}
function buildByVendedor(data,pfx,vk,vl){vk=vk||'A_Receber';vl=vl||'Valor a Receber';return _buildAgg(data,pfx+'_vnd','Vendedor','Vendedor',vk,vl);}
function buildByGerente(data,pfx,vk,vl){vk=vk||'A_Receber';vl=vl||'Valor a Receber';return _buildAgg(data,pfx+'_ger','Gerente','Gerente',vk,vl);}
function buildByGrupo(data,pfx,vk,vl){vk=vk||'A_Receber';vl=vl||'Valor a Receber';return _buildAgg(data,pfx+'_grp','Cliente_Agrupado','Cliente Agrupado',vk,vl);}

function renderVencidas(){
  const f=F.vencidas,data=applyF(D.vencidas,'vencidas'),v=V.vencidas;
  // Cards always show real totals per period — filtered by everything EXCEPT periodo
  const q=(f.search||'').toLowerCase().trim();
  const dataNoPeriodo=D.vencidas.filter(r=>{
    if(f.vendedor?.length&&!f.vendedor.includes(r.Vendedor)) return false;
    if(f.cliente?.length&&!f.cliente.includes(r.Nome_Fantasia)) return false;
    if(f.gerente?.length&&!f.gerente.includes(r.Gerente)) return false;
    if(f.cli_agrupado?.length&&!f.cli_agrupado.includes(r.Cliente_Agrupado)) return false;
    if(q){const h=[r.Razao_Social,r.Nome_Fantasia,r.Vendedor,String(r.Nota_Fiscal||''),r.CNPJ_CPF,r.Gerente,r.Cliente_Agrupado].map(x=>String(x||'').toLowerCase()).join(' ');if(!h.includes(q)) return false;}
    return true;
  });
  const PC_COLORS=['#ef4444','#f97316','#eab308','#a855f7','#64748b'];
  const periodCards=D.periodos.map((p,i)=>{
    const fil=dataNoPeriodo.filter(r=>r.Periodo===p);
    const sel=f.periodo.includes(p)?'sel':'';
    return '<div class="pc '+sel+'" onclick="setPeriodo(\''+esc(p)+'\')" style="border-left-color:'+PC_COLORS[i]+'">'
      +'<div class="pcl" style="color:'+PC_COLORS[i]+'">'+esc(p.split('(')[0].trim())+'</div>'
      +'<div class="pcc">'+esc(p.match(/\(.*\)/)?.[0]||'')+'</div>'
      +'<div class="pcv" style="color:'+PC_COLORS[i]+'">'+BRL(sum(fil,'A_Receber'))+'</div>'
      +'<div class="pcsub">'+FN(fil.length)+' títulos</div>'
      +'</div>';
  }).join('');
  // Humanize card — always from full dataNoPeriodo (ignores period filter)
  const humanizeRows=dataNoPeriodo.filter(r=>r.Cobranca==='Humanize');
  const humanizeVal=sum(humanizeRows,'A_Receber');
  const humanizePct=sum(dataNoPeriodo,'A_Receber')>0?(humanizeVal/sum(dataNoPeriodo,'A_Receber')*100).toFixed(1):'0.0';
  const humanizeCard='<div class="pc hum-card" style="border-left-color:#06b6d4;grid-column:1/-1">'
    +'<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
    +'<div style="flex:1">'
    +'<div class="pcl" style="color:#06b6d4">🏢 Em Cobrança · Humanize</div>'
    +'<div class="pcv" style="color:#06b6d4">'+BRL(humanizeVal)+'</div>'
    +'<div class="pcsub">'+FN(humanizeRows.length)+' títulos · '+humanizePct+'% do total vencido</div>'
    +'</div>'
    +'<div style="flex:1;min-width:160px">'
    +'<div style="font-size:10px;color:var(--dim);margin-bottom:4px">Share do vencido total</div>'
    +'<div style="background:#1e293b;border-radius:6px;height:8px;overflow:hidden">'
    +'<div style="width:'+humanizePct+'%;height:100%;background:#06b6d4;border-radius:6px"></div>'
    +'</div>'
    +'<div style="font-size:10px;color:#06b6d4;margin-top:3px;font-weight:700">'+humanizePct+'%</div>'
    +'</div>'
    +'</div>'
    +'</div>';

    return '<button class="vb'+(V.vencidas===vv?' act-d':'')+'" onclick="setV(\'vencidas\',\''+vv+'\')">'+lbls[vv]+'</button>';
  }).join('');

  const vbs=['semana','cliente','vendedor','gerente','grupo','detalhe'].filter(vv=>!(((IS_GV||IS_GER)&&vv==='gerente')||(IS_VND&&vv==='vendedor'))).map(vv=>{
    const lbls={semana:'Por Semana',cliente:'Por Cliente',vendedor:'Por Vendedor',gerente:'Por Gerente',grupo:'Por Cliente Agrupado',detalhe:'Detalhado'};
    return '<button class="vb'+(V.futuras===vv?' act-f':'')+'" onclick="setV(\'futuras\',\''+vv+'\')">'+lbls[vv]+'</button>';
  }).join('');
  let tbl='';
  if(v==='semana') tbl=buildBySemana(data);
  else if(v==='cliente') tbl=buildByCliente(data,'fut');
  else if(v==='vendedor') tbl=buildByVendedor(data,'fut');
  else if(v==='gerente') tbl=buildByGerente(data,'fut');
  else if(v==='grupo') tbl=buildByGrupo(data,'fut');
  else tbl=buildDetalhe(data,'fd',
    ['Nome_Fantasia','CNPJ_CPF','Gerente','Cliente_Agrupado','Vendedor','Vencimento_fmt','Nota_Fiscal','Parcela','A_Receber','Semana'],
    ['Cliente','CNPJ','Gerente','Cliente Agrupado','Vendedor','Vencimento','NF','Parcela','Valor a Receber','Semana']);
  const avS_set=new Set(avail(D.futuras,'Semana',f,'semana'));
  const avS=D.semanas.filter(s=>avS_set.has(s));
  const semanaSel=msDd('futuras','semana','Semana',avS,f.semana);
  document.getElementById('content').innerHTML=
    '<div class="card">'
    +fbar('futuras',semanaSel,data.length,sum(data,'A_Receber'))
    +'<div class="vbtns">'+vbs+'</div>'
    +tbl+'</div>';
  _applyMS();
}
function buildBySemana(data){
  const g=grp(data,'Semana');
  const semanas=D.semanas.filter(s=>g[s]&&g[s].length);
  if(!semanas.length) return '<div class="empty">Nenhum registro encontrado.</div>';
  return semanas.map((s,i)=>{
    const rows=g[s];
    return '<div style="margin-bottom:20px">'
      +'<div class="section-hdr">'
      +'<span class="wk"><i class="bi bi-calendar3"></i> '+esc(s)+'</span>'
      +'<span class="cnt-badge">'+FN(rows.length)+' títulos</span>'
      +'<span style="margin-left:auto;font-weight:700;color:var(--green)">'+BRL(sum(rows,'A_Receber'))+'</span>'
      +'</div>'
      +buildDetalhe(rows,'sw'+i,
        ['Nome_Fantasia','CNPJ_CPF','Gerente','Cliente_Agrupado','Vendedor','Vencimento_fmt','Nota_Fiscal','Parcela','A_Receber'],
        ['Cliente','CNPJ','Gerente','Cliente Agrupado','Vendedor','Vencimento','NF','Parcela','Valor a Receber'])
      +'</div>';
  }).join('');
}

/* ── RECEBIDOS ── */
function renderRecebidos(){
  if(!D.recebidos||D.recebidos.length===0){
    document.getElementById('content').innerHTML='<div class="card"><div class="empty">Nenhum dado de recebidos. Gere o dashboard com o arquivo de recebidos.</div></div>';return;
  }
  const f=F.recebidos,data=applyF(D.recebidos,'recebidos'),v=V.recebidos;
  const CATS=[
    {key:'na_data',     lbl:'Pago na Data',                 c:'#10b981',sub:'Previsão atingida'},
    {key:'ate_1semana', lbl:'Até 1 Semana de Atraso',       c:'#f59e0b',sub:'1 a 7 dias após previsão'},
    {key:'ate_1mes',    lbl:'1 Semana a 1 Mês de Atraso',   c:'#f97316',sub:'8 a 30 dias após previsão'},
    {key:'mais_1mes',   lbl:'Mais de 1 Mês de Atraso',      c:'#ef4444',sub:'Acima de 30 dias'},
  ];
  const cards=CATS.map(cd=>{
    const allRows=D.recebidos.filter(r=>r.Cat_Receb===cd.key);
    const isSel=f.cat.includes(cd.key);
    const selStyle=isSel?';box-shadow:0 0 0 2px '+cd.c+';background:'+cd.c+'15':'';
    return '<div class="rec-card" style="border-left-color:'+cd.c+selStyle+'" onclick="toggleCat(\''+cd.key+'\')">'
      +'<div class="rc-lbl" style="color:'+cd.c+'">'+cd.lbl+(isSel?' <span style="font-size:9px;background:'+cd.c+'33;padding:1px 5px;border-radius:8px">● filtrado</span>':'')+'</div>'
      +'<div class="rc-val" style="color:'+cd.c+'">'+BRL(sum(allRows,'Recebido'))+'</div>'
      +'<div class="rc-cnt">'+FN(allRows.length)+' título'+(allRows.length!==1?'s':'')+' · '+cd.sub+'</div>'
      +'</div>';
  }).join('');
  const vbs=['cliente','vendedor','gerente','grupo','detalhe'].filter(vv=>!(((IS_GV||IS_GER)&&vv==='gerente')||(IS_VND&&vv==='vendedor'))).map(vv=>{
    const lbls={cliente:'Por Cliente',vendedor:'Por Vendedor',gerente:'Por Gerente',grupo:'Por Cliente Agrupado',detalhe:'Detalhado'};
    return '<button class="vb'+(V.recebidos===vv?' act-r':'')+'" onclick="setV(\'recebidos\',\''+vv+'\')">'+lbls[vv]+'</button>';
  }).join('');
  let tbl='';
  const VK='Recebido',VL='Recebido';
  if(v==='cliente') tbl=buildByCliente(data,'rec',VK,VL);
  else if(v==='vendedor') tbl=buildByVendedor(data,'rec',VK,VL);
  else if(v==='gerente') tbl=buildByGerente(data,'rec',VK,VL);
  else if(v==='grupo') tbl=buildByGrupo(data,'rec',VK,VL);
  else tbl=buildDetalhe(data,'rd',
    ['Nome_Fantasia','CNPJ_CPF','Gerente','Cliente_Agrupado','Vendedor','Previsao_fmt','Vencimento_fmt','Nota_Fiscal','Valor_Conta','Recebido','A_Receber'],
    ['Cliente','CNPJ','Gerente','Cliente Agrupado','Vendedor','Previsão','Vencimento','NF','Valor da Conta','Recebido','Saldo Restante']);
  document.getElementById('content').innerHTML=
    '<div class="card">'
    +'<div class="rec-grid">'+cards+'</div>'
    +fbar('recebidos','',data.length,sum(data,'Recebido'))
    +'<div class="vbtns">'+vbs+'</div>'
    +tbl+'</div>';
  _applyMS();
}

/* ── ANNUAL PIVOT ── */
function _parseMes(fmt){
  if(!fmt) return '';
  const p=fmt.split('/');
  return p.length===3?p[2]+'-'+p[1]:'';
}
function renderAnual(){
  const year=new Date().getFullYear();
  const curM=new Date().getMonth()+1;
  const MN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const months=MN.map((_,i)=>year+'-'+String(i+1).padStart(2,'0'));

  // Pago: from annual_recebidos (aggregated by cliente + mes in Python)
  // Filter by gerente using the Gerente field embedded in annual_recebidos
  const fa=F.anual;
  const pagoMap={};
  (D.annual_recebidos||[]).forEach(r=>{
    const ca=r.Cliente_Agrupado||'Sem Grupo';
    const m=String(r.Mes||'');
    const ger=String(r.Gerente||'');
    if(!m.startsWith(String(year))) return;
    if(fa.gerente.length&&!fa.gerente.some(g=>g.toUpperCase()===ger.toUpperCase())) return;
    pagoMap[ca]=pagoMap[ca]||{};
    pagoMap[ca][m]=(pagoMap[ca][m]||0)+(parseFloat(r.Recebido)||0);
  });

  // A Receber: from vencidas + hoje + futuras by Previsao month
  const apagarMap={};
  [...D.vencidas,...D.hoje,...D.futuras].forEach(r=>{
    const ca=r.Cliente_Agrupado||'Sem Grupo';
    const m=_parseMes(r.Previsao_fmt||'');
    if(!m.startsWith(String(year))) return;
    apagarMap[ca]=apagarMap[ca]||{};
    apagarMap[ca][m]=(apagarMap[ca][m]||0)+(parseFloat(r.A_Receber)||0);
  });

  const allCAFull=[...new Set([...Object.keys(pagoMap),...Object.keys(apagarMap)])]
    .filter(x=>x&&x!=='nan').sort();

  // Build CA → Gerente map from contas data
  const caGer={};
  [...D.vencidas,...D.hoje,...D.futuras].forEach(r=>{
    if(r.Cliente_Agrupado&&r.Gerente&&!caGer[r.Cliente_Agrupado]) caGer[r.Cliente_Agrupado]=r.Gerente;
  });
  (D.annual_recebidos||[]).forEach(r=>{
    if(r.Cliente_Agrupado&&r.Gerente&&!caGer[r.Cliente_Agrupado]) caGer[r.Cliente_Agrupado]=r.Gerente;
  });

  // Available gerentes (considering CA filter for cascade)
  const caForGer=fa.cli_agrupado.length?allCAFull.filter(c=>fa.cli_agrupado.includes(c)):allCAFull;
  const availGers=[...new Set(caForGer.map(c=>caGer[c]||'').filter(g=>g))].sort();
  // Available CAs (considering gerente filter for cascade)
  const caForCA=fa.gerente.length?allCAFull.filter(c=>fa.gerente.includes(caGer[c]||'')):allCAFull;
  const availCA=caForCA;
  // Final filtered list
  let allCA=allCAFull;
  if(fa.gerente.length){
    const pagoKeys=new Set(Object.keys(pagoMap));
    allCA=allCA.filter(c=>pagoKeys.has(c)||fa.gerente.some(g=>g.toUpperCase()===(caGer[c]||'').toUpperCase()));
  }
  if(fa.cli_agrupado.length) allCA=allCA.filter(c=>fa.cli_agrupado.includes(c));

  // Month-level totals
  const mTP={},mTA={};
  months.forEach(m=>{mTP[m]=0;mTA[m]=0;});
  allCA.forEach(ca=>{
    months.forEach(m=>{
      mTP[m]+=(pagoMap[ca]||{})[m]||0;
      mTA[m]+=(apagarMap[ca]||{})[m]||0;
    });
  });

  // Header helpers
  const isPast=i=>(i+1)<curM;
  const isCur=i=>(i+1)===curM;
  const hBg=i=>isCur(i)?'background:#f59e0b22;color:var(--accent);'
    :isPast(i)?'background:#1e293b55;color:#94a3b8;':'background:#1e293b33;color:var(--text);';
  const cBg=i=>isCur(i)?'background:#f59e0b08;':isPast(i)?'background:#ffffff03;':'';

  // Build 2-row header
  let th1='<tr><th rowspan="2" class="sc" style="min-width:140px;vertical-align:middle;position:sticky;left:0;top:0;z-index:3;background:var(--card)">Cliente Agrupado</th>';
  let th2='<tr>';
  months.forEach((m,i)=>{
    th1+='<th colspan="2" style="text-align:center;'+hBg(i)+'font-size:11px;border-left:1px solid var(--border)">'+MN[i]+'</th>';
    th2+='<th class="nr mp" style="font-size:10px;'+hBg(i)+'border-left:1px solid var(--border)">Pago</th>';
    th2+='<th class="nr mf" style="font-size:10px;'+hBg(i)+'">Falta</th>';
  });
  th1+='<th colspan="2" style="text-align:center;background:#1e293b;color:var(--accent);font-size:11px;border-left:2px solid var(--accent)">Total Ano</th></tr>';
  th2+='<th class="nr mp" style="font-size:10px;border-left:2px solid var(--accent)">Pago</th><th class="nr mf" style="font-size:10px">Falta</th></tr>';

  // Build rows
  let grandP=0,grandA=0;
  const rows=allCA.map(ca=>{
    let rP=0,rA=0;
    let cells='<td class="sc" style="font-weight:600;white-space:nowrap">'+esc(ca)+'</td>';
    months.forEach((m,i)=>{
      const p=(pagoMap[ca]||{})[m]||0;
      const a=(apagarMap[ca]||{})[m]||0;
      rP+=p;rA+=a;
      const bg=cBg(i);
      const bl=i===0?'':'border-left:1px solid var(--border);';
      cells+='<td class="nr" style="'+bg+bl+'" data-v="'+p+'">'+(p>0?'<span class="mp">'+BRL(p)+'</span>':'<span class="mz">—</span>')+'</td>';
      cells+='<td class="nr" style="'+bg+'" data-v="'+a+'">'+(a>0?'<span class="mf">'+BRL(a)+'</span>':'<span class="mz">—</span>')+'</td>';
    });
    grandP+=rP;grandA+=rA;
    cells+='<td class="nr" style="border-left:2px solid var(--accent)" data-v="'+rP+'"><b class="mp">'+BRL(rP)+'</b></td>';
    cells+='<td class="nr" data-v="'+rA+'"><b class="mf">'+BRL(rA)+'</b></td>';
    return '<tr>'+cells+'</tr>';
  }).join('');

  // Totals row
  let totRow='<tr class="tot"><td class="sc" style="position:sticky;left:0;background:#1e293b">TOTAL</td>';
  months.forEach((m,i)=>{
    const bl=i===0?'':'border-left:1px solid var(--border);';
    totRow+='<td class="nr" style="'+bl+'"><span class="mp">'+BRL(mTP[m])+'</span></td>';
    totRow+='<td class="nr"><span class="mf">'+BRL(mTA[m])+'</span></td>';
  });
  totRow+='<td class="nr" style="border-left:2px solid var(--accent)"><b class="mp">'+BRL(grandP)+'</b></td>';
  totRow+='<td class="nr"><b class="mf">'+BRL(grandA)+'</b></td>';
  totRow+='</tr>';

  const noRec=!D.annual_recebidos||D.annual_recebidos.length===0;
  const cover=grandP+grandA>0?((grandP/(grandP+grandA))*100).toFixed(1)+'%':'—';

  document.getElementById('content').innerHTML=
    '<div class="card">'
    +(noRec?'<div style="background:#f59e0b22;border:1px solid #f59e0b55;border-radius:8px;padding:10px 16px;margin-bottom:14px;font-size:12px;color:var(--accent)"><i class="bi bi-info-circle"></i> Coluna <b>Pago</b> ficará zerada pois nenhum arquivo de recebidos foi fornecido. Arraste o arquivo de recebidos junto com o de contas no <b>.bat</b> para ver os pagamentos.</div>':'')
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">'
    +'<div class="kpi"><div class="lbl">Total Recebido no Ano</div><div class="val" style="color:#10b981">'+BRL(grandP)+'</div><div class="cnt">pelo arquivo de recebidos</div></div>'
    +'<div class="kpi"><div class="lbl">Total a Receber</div><div class="val" style="color:#ef4444">'+BRL(grandA)+'</div><div class="cnt">em aberto (contas)</div></div>'
    +'<div class="kpi"><div class="lbl">Cobertura do Ano</div><div class="val" style="color:#3b82f6">'+cover+'</div><div class="cnt">do total previsto já pago</div></div>'
    +'</div>'
    +'<div class="fbar">'
    +'<i class="bi bi-funnel" style="color:var(--dim)"></i>'
    +((IS_GV||IS_GER)?'':msDd('anual','gerente','Gerente',availGers,fa.gerente))
    +msDd('anual','cli_agrupado','Cliente Agrupado',availCA,fa.cli_agrupado)
    +(fa.gerente.length||fa.cli_agrupado.length?'<button class="fbar-reset" onclick="clrF(\'anual\')">✕ Limpar</button>':'')
    +'<span class="cnt-badge" style="margin-left:auto">'+FN(allCA.length)+' cliente'+(allCA.length!==1?'s':'')+'</span>'
    +'</div>'
    +dlBtn('anual_tbl','recebidos_a_receber_'+year)
    +'<div class="anual-scroll-top" id="aw_top"><div id="aw_inner"></div></div>'
    +'<div class="tbl-wrap" id="aw_bot"><table class="dt dt-anual" id="anual_tbl">'
    +'<thead>'+th1+th2+'</thead>'
    +'<tbody>'+rows+totRow+'</tbody>'
    +'</table></div>'
    +'</div>';
  _applyMS();
  setTimeout(()=>{
    const bot=document.getElementById('aw_bot');
    const top=document.getElementById('aw_top');
    const inner=document.getElementById('aw_inner');
    if(bot&&top&&inner){
      inner.style.width=bot.scrollWidth+'px';
      let _sync=false;
      top.addEventListener('scroll',()=>{if(!_sync){_sync=true;bot.scrollLeft=top.scrollLeft;_sync=false;}});
      bot.addEventListener('scroll',()=>{if(!_sync){_sync=true;top.scrollLeft=bot.scrollLeft;_sync=false;}});
    }
  },80);
}

/* ── OVERVIEW ── */
const _ovCharts={};
function renderOverview(){
  const venc=D.vencidas;
  const tv=sum(venc,'A_Receber'),th2=sum(D.hoje,'A_Receber'),tf=sum(D.futuras,'A_Receber');
  const tot=tv+th2+tf;
  const pct=tot>0?(tv/tot*100).toFixed(1):'0.0';
  const crit=venc.filter(r=>(parseInt(r.Dias_Atraso)||0)>90);
  const tv_crit=sum(crit,'A_Receber');
  const dist_cli=Object.keys(grp(venc,'CNPJ_CPF')).length;

  const byGer=grp(venc,'Gerente');
  const gerData=Object.entries(byGer)
    .map(([g,rs])=>({g:g||'Sem Gerente',t:sum(rs,'A_Receber'),n:rs.length}))
    .sort((a,b)=>b.t-a.t);
  const topGer=gerData[0]?.g||'—';

  // Humanize stats for overview
  const humRows=venc.filter(r=>r.Cobranca==='Humanize');
  const humVal=sum(humRows,'A_Receber');
  const humPct=tv>0?(humVal/tv*100).toFixed(1):'0.0';

  const byGrp=grp(venc,'Cliente_Agrupado');
  const grpData=Object.entries(byGrp)
    .map(([g,rs])=>({g:g||'Sem Grupo',t:sum(rs,'A_Receber'),n:rs.length}))
    .sort((a,b)=>b.t-a.t).slice(0,10);

  const topCli=Object.entries(byGrp)
    .map(([k,rs])=>({
      k:k||'Sem Grupo',
      val:sum(rs,'A_Receber'),
      n:rs.length,
      avgDias:rs.reduce((s,r)=>s+(parseFloat(r.Dias_Atraso)||0),0)/(rs.length||1),
      gerente:rs[0]?.Gerente||'—'
    }))
    .sort((a,b)=>b.val-a.val).slice(0,10);

  const GC=['#ef4444','#f97316','#eab308','#a855f7','#64748b','#3b82f6','#10b981','#06b6d4'];
  const gerBars=gerData.map((g,i)=>{
    const p=tv>0?(g.t/tv*100):0;
    const c=GC[i%GC.length];
    return '<div class="ov-prog-item">'
      +'<div class="ov-prog-label"><span style="font-weight:600">'+esc(g.g)+'</span>'
      +'<span style="color:'+c+';font-weight:700">'+BRL(g.t)+'</span></div>'
      +'<div class="ov-prog-bar"><div class="ov-prog-fill" style="width:'+p.toFixed(1)+'%;background:'+c+'"></div></div>'
      +'<div class="ov-prog-sub">'+p.toFixed(1)+'% do vencido · '+FN(g.n)+' títulos</div>'
      +'</div>';
  }).join('');

  const critColor=d=>d>365?'#64748b':d>180?'#a855f7':d>90?'#eab308':d>31?'#f97316':'#ef4444';
  const scoreRows=topCli.map((r,i)=>{
    const cc=critColor(r.avgDias);
    return '<tr>'
      +'<td style="color:var(--dim);text-align:center;font-weight:700" data-v="'+i+'">'+(i+1)+'</td>'
      +'<td style="font-weight:600" data-v="'+esc(r.k)+'">'+esc(r.k)+'</td>'
      +(IS_GER?'':'<td style="color:var(--dim);font-size:11px" data-v="'+esc(r.gerente)+'">'+esc(r.gerente)+'</td>')
      +'<td class="nr" data-v="'+r.n+'">'+FN(r.n)+'</td>'
      +'<td class="nr" style="color:var(--accent);font-weight:700" data-v="'+r.val+'">'+BRL(r.val)+'</td>'
      +'<td class="nr" data-v="'+Math.round(r.avgDias)+'">'
      +'<span style="background:'+cc+'22;color:'+cc+';padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700">'+Math.round(r.avgDias)+' dias</span>'
      +'</td>'
      +'</tr>';
  }).join('');

  // Humanize breakdown by gerente
  const humByGer=grp(humRows,'Gerente');
  const humGerBars=Object.entries(humByGer)
    .map(([g,rs])=>({g:g||'Sem Gerente',t:sum(rs,'A_Receber'),n:rs.length}))
    .sort((a,b)=>b.t-a.t)
    .map((g,i)=>{
      const p=humVal>0?(g.t/humVal*100):0;
      return '<div class="ov-prog-item">'
        +'<div class="ov-prog-label"><span style="font-weight:600">'+esc(g.g)+'</span>'
        +'<span style="color:#06b6d4;font-weight:700">'+BRL(g.t)+'</span></div>'
        +'<div class="ov-prog-bar"><div class="ov-prog-fill" style="width:'+p.toFixed(1)+'%;background:#06b6d4"></div></div>'
        +'<div class="ov-prog-sub">'+p.toFixed(1)+'% do Humanize · '+FN(g.n)+' títulos</div>'
        +'</div>';
    }).join('');

  document.getElementById('content').innerHTML=
    '<div class="card">'
    +'<div class="ov-kpi-row" style="grid-template-columns:repeat('+(IS_GV?'5':((IS_HUM&&IS_GER)?'4':((IS_HUM||IS_GER)?'5':'6')))+',1fr)">'
    +'<div class="kpi"><div class="lbl">Total Vencido</div><div class="val" style="color:#ef4444">'+BRL(tv)+'</div><div class="cnt">'+FN(venc.length)+' títulos</div></div>'
    +'<div class="kpi"><div class="lbl">% Carteira Vencida</div><div class="val" style="color:#f97316">'+pct+'%</div><div class="cnt">do total a receber</div></div>'
    +'<div class="kpi"><div class="lbl">Crítico (+90 dias)</div><div class="val" style="color:#a855f7">'+BRL(tv_crit)+'</div><div class="cnt">'+FN(crit.length)+' títulos</div></div>'
    +((IS_GV||IS_GER)?'':'<div class="kpi"><div class="lbl">Gerente Mais Crítico</div><div class="val" style="color:#f59e0b;font-size:14px">'+esc(topGer)+'</div><div class="cnt">'+BRL(gerData[0]?.t||0)+'</div></div>')
    +'<div class="kpi"><div class="lbl">Clientes Vencidos</div><div class="val" style="color:#3b82f6">'+FN(dist_cli)+'</div><div class="cnt">CNPJs distintos</div></div>'
    +(IS_HUM?'':'<div class="kpi" style="border-color:#06b6d455"><div class="lbl" style="color:#06b6d4">🏢 Em Cobrança</div><div class="val" style="color:#06b6d4">'+BRL(humVal)+'</div><div class="cnt">'+FN(humRows.length)+' títulos · '+humPct+'%</div></div>')
    +'</div>'
    +(IS_GV||IS_GER
      // ── layout compacto: sem gráfico/share por gerente ──
      ?'<div class="ov-charts">'
        +'<div class="ov-panel"><div class="ov-panel-title">📊 Top 10 · Cliente Agrupado (Vencido)</div><canvas id="chart_grp"></canvas></div>'
        +(IS_HUM?'':'<div class="ov-panel"><div class="ov-panel-title">🏢 Humanize vs Carteira Própria</div><canvas id="chart_hum" style="max-height:260px"></canvas></div>')
        +'</div>'
        +'<div class="ov-panel" style="margin-bottom:20px">'
        +'<div class="ov-panel-title">🚨 Top 10 Clientes Mais Críticos (por Valor Vencido)</div>'
        +dlBtn('sc_top10','top10_criticos')
        +'<div class="tbl-wrap"><table class="dt" id="sc_top10"><thead><tr>'
        +(IS_GER
          ? TH('#',0,'sc_top10')+TH('Cliente Agrupado',1,'sc_top10')+TH('Títulos',2,'sc_top10')+TH('Valor Vencido',3,'sc_top10')+TH('Dias Médio',4,'sc_top10')
          : TH('#',0,'sc_top10')+TH('Cliente Agrupado',1,'sc_top10')+TH('Gerente',2,'sc_top10')+TH('Títulos',3,'sc_top10')+TH('Valor Vencido',4,'sc_top10')+TH('Dias Médio',5,'sc_top10')
        )
        +'</tr></thead><tbody>'+scoreRows+'</tbody></table></div>'
        +'</div>'
      // ── layout geral: estrutura original ──
      :'<div class="ov-charts">'
        +'<div class="ov-panel"><div class="ov-panel-title">📊 Vencido por Gerente</div><canvas id="chart_ger"></canvas></div>'
        +'<div class="ov-panel"><div class="ov-panel-title">📊 Top 10 · Cliente Agrupado (Vencido)</div><canvas id="chart_grp"></canvas></div>'
        +'</div>'
        +(IS_HUM?'':'<div class="ov-charts">'
        +'<div class="ov-panel"><div class="ov-panel-title">🏢 Humanize vs Carteira Própria</div><canvas id="chart_hum" style="max-height:200px"></canvas></div>'
        +'<div class="ov-panel"><div class="ov-panel-title">🏢 Humanize por Gerente</div>'+(humGerBars||'<div class="empty">Sem dados Humanize.</div>')+'</div>'
        +'</div>')
        +'<div class="ov-bottom">'
        +'<div class="ov-panel"><div class="ov-panel-title">🎯 Share por Gerente</div>'+gerBars+'</div>'
        +'<div class="ov-panel">'
        +'<div class="ov-panel-title">🚨 Top 10 Clientes Mais Críticos (por Valor Vencido)</div>'
        +dlBtn('sc_top10','top10_criticos')
        +'<div class="tbl-wrap"><table class="dt" id="sc_top10"><thead><tr>'
        +(IS_GER
          ? TH('#',0,'sc_top10')+TH('Cliente Agrupado',1,'sc_top10')+TH('Títulos',2,'sc_top10')+TH('Valor Vencido',3,'sc_top10')+TH('Dias Médio',4,'sc_top10')
          : TH('#',0,'sc_top10')+TH('Cliente Agrupado',1,'sc_top10')+TH('Gerente',2,'sc_top10')+TH('Títulos',3,'sc_top10')+TH('Valor Vencido',4,'sc_top10')+TH('Dias Médio',5,'sc_top10')
        )
        +'</tr></thead><tbody>'+scoreRows+'</tbody></table></div>'
        +'</div>'
        +'</div>'
    )
    +'</div>';

  _addDualScroll();
  setTimeout(()=>{
    if(_ovCharts.ger){try{_ovCharts.ger.destroy();}catch(e){} _ovCharts.ger=null;}
    if(_ovCharts.grp){try{_ovCharts.grp.destroy();}catch(e){} _ovCharts.grp=null;}
    if(_ovCharts.hum){try{_ovCharts.hum.destroy();}catch(e){} _ovCharts.hum=null;}
    const cGer=document.getElementById('chart_ger');
    const cGrp=document.getElementById('chart_grp');
    const cHum=document.getElementById('chart_hum');
    if(!window.Chart||!cGrp) return;
    const defOpts={responsive:true,maintainAspectRatio:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'R$ '+R(ctx.raw,0)}}}};
    if(cGer){_ovCharts.ger=new Chart(cGer,{type:'bar',
      data:{labels:gerData.map(g=>g.g),
        datasets:[{label:'Vencido',data:gerData.map(g=>g.t),
          backgroundColor:gerData.map((_,i)=>GC[i%GC.length]+'99'),
          borderColor:gerData.map((_,i)=>GC[i%GC.length]),borderWidth:1,borderRadius:4}]},
      options:{...defOpts,scales:{
        x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8',font:{size:10},callback:v=>'R$ '+R(v,0)},grid:{color:'#1e293b'}}}}});}
    _ovCharts.grp=new Chart(cGrp,{type:'bar',
      data:{labels:grpData.map(g=>g.g.length>22?g.g.slice(0,22)+'…':g.g),
        datasets:[{label:'Vencido',data:grpData.map(g=>g.t),
          backgroundColor:'#f59e0b55',borderColor:'#f59e0b',borderWidth:1,borderRadius:4}]},
      options:{...defOpts,indexAxis:'y',scales:{
        x:{ticks:{color:'#94a3b8',font:{size:10},callback:v=>'R$ '+R(v,0)},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}}}}});
    if(cHum){
      const notHum=tv-humVal;
      _ovCharts.hum=new Chart(cHum,{type:'doughnut',
        data:{labels:['Humanize ('+humPct+'%)','Carteira Própria ('+(100-parseFloat(humPct)).toFixed(1)+'%)'],
          datasets:[{data:[humVal,notHum],
            backgroundColor:['#06b6d4aa','#334155'],
            borderColor:['#06b6d4','#475569'],borderWidth:2,hoverOffset:6}]},
        options:{responsive:true,maintainAspectRatio:true,cutout:'65%',
          plugins:{legend:{position:'bottom',labels:{color:'#94a3b8',font:{size:11},padding:12}},
            tooltip:{callbacks:{label:ctx=>'R$ '+R(ctx.raw,0)+' ('+ctx.label+')'}}}}});
    }
  },0);
}

/* ── HISTÓRICO ── */
let _histChart=null;
function renderHistorico(){
  const el=document.getElementById('content');
  if(!HIST||!HIST.length){
    el.innerHTML='<div class="card"><div class="empty">Nenhum historico salvo ainda.<br>O historico e gerado automaticamente a cada atualizacao do dashboard.</div></div>';
    return;
  }
  const cards=HIST.map((h,i)=>{
    const p=i>0?HIST[i-1]:null;
    const dv=p&&p.total_vencido>0?((h.total_vencido-p.total_vencido)/p.total_vencido*100).toFixed(1):null;
    const up=dv!==null&&parseFloat(dv)>=0;
    return '<div class="hist-card" id="hc-'+i+'" onclick="pickHist('+i+')">'
      +'<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px">'+esc(h.mes_label)+'</div>'
      +'<div class="hist-duo">'
      +'<div class="hist-cell"><div class="hist-cell-lbl">Vencido</div><div class="hist-cell-val" style="color:var(--red)">'+BRL(h.total_vencido)+'</div></div>'
      +'<div class="hist-cell"><div class="hist-cell-lbl">A receber</div><div class="hist-cell-val" style="color:var(--green)">'+BRL(h.futuro)+'</div></div>'
      +'</div>'
      +(dv!==null?'<div style="font-size:10px;color:'+(up?'var(--red)':'var(--green)')+';">'+(up?'&#8593; vencido +':'&#8595; vencido ')+Math.abs(dv)+'% vs anterior</div>':'')
      +'<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:6px;font-size:10px;color:var(--dim)">Recebido: '+BRL(h.total_recebido)+'<br>'+h.pct_vencida+'% carteira vencida</div>'
      +'</div>';
  }).join('');
  const legend='<div style="display:flex;gap:18px;margin-bottom:10px">'
    +'<span style="font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#ef4444"></span>Total vencido</span>'
    +'<span style="font-size:11px;color:var(--dim);display:flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#10b981"></span>A receber futuro</span>'
    +'</div>';
  el.innerHTML='<div class="card">'
    +'<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px">Evolucao mensal</div>'
    +legend
    +'<div style="position:relative;height:160px;margin-bottom:20px"><canvas id="histChart" role="img" aria-label="Grafico de barras vencido e a receber por mes"></canvas></div>'
    +'<div style="font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px">Fechamentos</div>'
    +'<div class="hist-grid">'+cards+'</div>'
    +'<div id="hist-detail"></div>'
    +'</div>';
  setTimeout(()=>{
    const cv=document.getElementById('histChart');
    if(!cv||!window.Chart) return;
    if(_histChart){_histChart.destroy();_histChart=null;}
    _histChart=new Chart(cv,{type:'bar',
      data:{
        labels:HIST.map(h=>h.mes_label),
        datasets:[
          {label:'Vencido',data:HIST.map(h=>h.total_vencido),backgroundColor:'#ef444466',borderColor:'#ef4444',borderWidth:1,borderRadius:4},
          {label:'A receber',data:HIST.map(h=>h.futuro),backgroundColor:'#10b98166',borderColor:'#10b981',borderWidth:1,borderRadius:4}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+BRL(ctx.raw)}}},
        scales:{
          x:{ticks:{color:'#94a3b8',font:{size:11}},grid:{color:'#1e293b'}},
          y:{ticks:{color:'#94a3b8',font:{size:10},callback:v=>{
            if(v>=1000000) return'R$ '+(v/1000000).toFixed(1)+'M';
            if(v>=1000) return'R$ '+(v/1000).toFixed(0)+'k';
            return'R$ '+R(v,0);
          }},grid:{color:'#1e293b'}}
        }
      }
    });
    pickHist(HIST.length-1);
  },0);
}
window.pickHist=function(i){
  document.querySelectorAll('.hist-card').forEach((c,j)=>c.classList.toggle('hist-card-sel',j===i));
  const h=HIST[i];
  const p=i>0?HIST[i-1]:null;
  const dv=p&&p.total_vencido>0?((h.total_vencido-p.total_vencido)/p.total_vencido*100).toFixed(1):null;
  const up=dv!==null&&parseFloat(dv)>=0;
  document.getElementById('hist-detail').innerHTML='<div class="hist-detail">'
    +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
    +'<span style="font-size:14px;font-weight:700;color:var(--text)">'+esc(h.mes_label)+'</span>'
    +'<span style="font-size:10px;color:var(--dim);margin-left:auto">snapshot: '+esc(h.gerado_em)+'</span>'
    +'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px">'
    +'<div class="kpi"><div class="lbl">Total vencido</div><div class="val" style="color:var(--red)">'+BRL(h.total_vencido)+'</div><div class="cnt">&nbsp;</div></div>'
    +'<div class="kpi"><div class="lbl">A receber (futuro)</div><div class="val" style="color:var(--green)">'+BRL(h.futuro)+'</div><div class="cnt">&nbsp;</div></div>'
    +'<div class="kpi"><div class="lbl">Total recebido</div><div class="val" style="color:var(--blue)">'+BRL(h.total_recebido)+'</div><div class="cnt">&nbsp;</div></div>'
    +'<div class="kpi"><div class="lbl">Critico +90 dias</div><div class="val" style="color:var(--red)">'+BRL(h.critico_90)+'</div><div class="cnt">&nbsp;</div></div>'
    +'<div class="kpi"><div class="lbl">% carteira vencida</div><div class="val" style="color:#f97316">'+h.pct_vencida+'%</div><div class="cnt">&nbsp;</div></div>'
    +'<div class="kpi"><div class="lbl">Em cobranca Humanize</div><div class="val" style="color:#06b6d4">'+BRL(h.humanize)+'</div><div class="cnt">&nbsp;</div></div>'
    +(dv!==null?'<div class="kpi"><div class="lbl">Vencido vs mes ant.</div><div class="val" style="color:'+(up?'var(--red)':'var(--green)')+'">'+( up?'&#8593; +':'&#8595; ')+Math.abs(dv)+'%</div><div class="cnt">&nbsp;</div></div>':'')
    +'</div>'
    +'</div>';
};

/* ── INIT ── */
renderKPIs();initNav();if(IS_OV) renderVencidas(); else renderOverview();
</script>
</body>
