<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/config.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Travel Blue | Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ── Dashboard Layout ── */
    .dash-section { padding: 28px 32px; }
    .dash-section-title {
      font-size: 14px; font-weight: 700; color: var(--navy);
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 2px solid var(--gray-light);
    }

    /* KPI cards */
    .kpi-row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
    .kpi-card {
      flex: 1; min-width: 140px; max-width: 220px;
      background: var(--card, #fff); border-radius: var(--radius);
      padding: 18px 20px; box-shadow: var(--shadow);
      border-top: 3px solid var(--navy);
    }
    .kpi-label  { font-size: 11px; font-weight: 600; color: var(--gray); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .kpi-value  { font-size: 26px; font-weight: 800; color: var(--navy); line-height: 1; }
    .kpi-sub    { font-size: 11px; color: var(--gray); margin-top: 5px; }

    /* Charts */
    .charts-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
    .chart-card {
      background: var(--card, #fff); border-radius: var(--radius);
      padding: 20px 22px; box-shadow: var(--shadow);
    }
    .chart-card-title { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 14px; }
    .chart-wrap { position: relative; height: 240px; }

    /* Data table */
    .dt-controls {
      display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap;
    }
    .dt-search {
      flex: 1; min-width: 180px; padding: 8px 12px;
      border: 1.5px solid var(--gray-light); border-radius: 7px;
      font-size: 13px; outline: none;
    }
    .dt-search:focus { border-color: var(--navy); }
    .dt-count { font-size: 12px; color: var(--gray); }
    .dt-table-wrap { overflow-x: auto; border-radius: var(--radius); box-shadow: var(--shadow); }
    .dt-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .dt-table th {
      background: var(--navy); color: #fff; padding: 10px 14px;
      text-align: left; font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; user-select: none;
    }
    .dt-table th:hover { background: var(--navy-light, #253580); }
    .dt-table th .sort-icon { opacity: .5; margin-left: 4px; }
    .dt-table th.sorted-asc  .sort-icon::after { content: ' ▲'; opacity: 1; }
    .dt-table th.sorted-desc .sort-icon::after { content: ' ▼'; opacity: 1; }
    .dt-table th .sort-icon::after { content: ' ⇅'; }
    .dt-table td { padding: 9px 14px; border-bottom: 1px solid var(--gray-light); color: var(--text); }
    .dt-table tr:nth-child(even) td { background: rgba(27,42,107,.03); }
    .dt-table tr:hover td { background: rgba(27,42,107,.07); }
    .dt-pagination {
      display: flex; gap: 6px; align-items: center; justify-content: flex-end;
      margin-top: 12px; font-size: 13px;
    }
    .dt-pagination button {
      padding: 5px 12px; border: 1.5px solid var(--gray-light); background: #fff;
      border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--navy);
    }
    .dt-pagination button:disabled { opacity: .4; cursor: default; }
    .dt-pagination button.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    /* Editor panel */
    .editor-panel {
      position: fixed; top: 0; right: -400px; width: 380px; height: 100vh;
      background: #fff; box-shadow: -4px 0 24px rgba(0,0,0,0.15);
      z-index: 1000; transition: right .3s ease; overflow-y: auto;
      padding: 24px 20px;
    }
    .editor-panel.open { right: 0; }
    .editor-panel-title { font-size: 16px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .editor-panel-sub   { font-size: 12px; color: var(--gray); margin-bottom: 20px; }
    .editor-col-row     { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--gray-light); }
    .editor-col-name    { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
    .editor-col-type    { font-size: 11px; color: var(--gray); }
    .editor-col-select  { padding: 5px 8px; border: 1.5px solid var(--gray-light); border-radius: 6px; font-size: 12px; }
    .editor-actions     { display: flex; gap: 10px; margin-top: 20px; }

    /* Empty + Loading states */
    .state-card {
      text-align: center; padding: 60px 24px;
      background: var(--card, #fff); border-radius: var(--radius);
      box-shadow: var(--shadow); margin: 32px;
    }
    .state-icon  { font-size: 48px; margin-bottom: 12px; }
    .state-title { font-size: 20px; font-weight: 700; color: var(--navy); }
    .state-sub   { font-size: 14px; color: var(--gray); margin-top: 8px; }

    /* Floating editor toggle button */
    #editor-toggle {
      display: none;
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      padding: 10px 18px; background: var(--yellow, #FFC72C); color: var(--navy);
      border: none; border-radius: 8px; font-size: 13px; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="topbar-logo">
      <svg class="logo-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="8" fill="#1B2A6B"/>
        <path d="M10 34 Q16 10 24 24 Q32 38 38 14" stroke="#FFC72C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <circle cx="38" cy="14" r="2.5" fill="#FFC72C"/>
      </svg>
      <div class="logo-text-wrap">
        <span class="logo-brand">Travel Blue</span>
        <span class="logo-tagline">London · Since 1987</span>
      </div>
    </div>
    <nav class="topbar-nav">
      <a href="/home.html">Home</a>
      <div class="nav-dropdown" id="nav-projects-dropdown">
        <div class="nav-dropdown-btn active">
          Projects
          <i data-lucide="chevron-down" class="chevron"></i>
        </div>
        <div class="nav-dropdown-menu" id="nav-projects-menu"></div>
      </div>
      <div class="nav-dropdown" id="nav-admin-dropdown" style="display:none;">
        <div class="nav-dropdown-btn">
          Admin
          <i data-lucide="chevron-down" class="chevron"></i>
        </div>
        <div class="nav-dropdown-menu">
          <a href="/admin/index.html?tab=users"><span class="menu-icon"><i data-lucide="users"></i></span> User Management</a>
          <div id="nav-projects-admin-link" style="display:none;">
            <a href="/admin/index.html?tab=projects"><span class="menu-icon"><i data-lucide="folder"></i></span> Projects</a>
          </div>
        </div>
      </div>
    </nav>
    <div class="topbar-search">
      <i data-lucide="search" class="topbar-search-icon"></i>
      <input type="search" class="topbar-search-input" placeholder="Search…" id="topbar-search" />
    </div>
    <div class="topbar-user">
      <div class="user-info">
        <div class="user-name">
          <span id="user-name">—</span>
          <span id="role-badge" class="role-badge" style="display:none;"></span>
        </div>
        <div class="user-email" id="user-email">—</div>
      </div>
      <button class="btn-theme" id="btn-theme" title="Toggle dark mode"><i data-lucide="moon"></i></button>
      <button class="btn-logout" data-logout>Sign Out</button>
    </div>
  </header>

  <!-- BANNER -->
  <section class="page-banner">
    <h1><span id="proj-icon-banner">📊</span> <span id="proj-name-banner">Dashboard</span></h1>
    <p id="proj-desc-banner"></p>
  </section>

  <!-- CONTENT -->
  <main class="main-content" id="dash-main">
    <div class="state-card" id="state-loading">
      <div class="state-icon">⏳</div>
      <div class="state-title">Loading dashboard…</div>
      <div class="state-sub">Fetching data from Supabase.</div>
    </div>
  </main>

  <!-- EDITOR PANEL -->
  <div class="editor-panel" id="editor-panel">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div class="editor-panel-title">✏️ Edit Dashboard</div>
        <div class="editor-panel-sub">Configure what each column displays as.</div>
      </div>
      <button onclick="toggleEditor()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray);">✕</button>
    </div>
    <div id="editor-cols"></div>
    <div class="editor-actions">
      <button class="btn-navy" onclick="saveEditorConfig()" style="flex:1;padding:10px;font-size:13.5px;">Save Config</button>
      <button class="btn-ghost" onclick="toggleEditor()" style="padding:10px 16px;font-size:13.5px;">Cancel</button>
    </div>
  </div>

  <!-- Editor toggle (owner/admin only) -->
  <button id="editor-toggle" onclick="toggleEditor()">✏️ Edit Dashboard</button>

  <footer class="site-footer">
    © 2026 <span>Travel Blue Ltd.</span> — Internal use only.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/js/mock-data.js"></script>
  <script src="/js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="/js/theme.js"></script>
  <script>
  /* ============================================================
     PROJECT TEMPLATE — Auto-generated dashboard
     ============================================================ */

  const CHART_COLORS = [
    '#1B2A6B','#FFC72C','#27AE60','#E74C3C','#3498DB','#9B59B6','#F39C12','#1ABC9C'
  ];

  let _slug, _projectData, _meta, _chartConfig, _user, _sbClient;
  let _sortCol = null, _sortDir = 'asc', _searchQuery = '', _page = 0;
  const PAGE_SIZE = 50;
  const _activeCharts = [];

  /* ── Format a number for display ── */
  function fmt(v) {
    const n = parseFloat(v);
    if (isNaN(n)) return v ?? '—';
    if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n % 1 === 0 ? n.toLocaleString() : n.toFixed(2).toLocaleString();
  }

  /* ── Show a state card ── */
  function showState(icon, title, sub, extra = '') {
    document.getElementById('dash-main').innerHTML = `
      <div class="state-card">
        <div class="state-icon">${icon}</div>
        <div class="state-title">${title}</div>
        <div class="state-sub">${sub}</div>
        ${extra}
      </div>`;
  }

  /* ── Main init ── */
  (async () => {
    _user = await Auth.requireLogin();
    if (!_user) return;

    _slug = new URLSearchParams(window.location.search).get('slug');
    if (!_slug) { window.location.href = '/home.html'; return; }

    _sbClient = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_KEY);

    // Auth checks
    if (!Auth.canViewProject(_user, _slug)) {
      window.location.href = '/home.html'; return;
    }

    Auth.renderUser(_user, '#user-name', '#user-email');
    Auth.renderRoleBadge(_user, '#role-badge');
    if (Auth.isAdminOrOwner(_user)) document.getElementById('nav-admin-dropdown').style.display = 'flex';
    if (Auth.isOwner(_user)) document.getElementById('nav-projects-admin-link').style.display = 'block';

    // Build nav
    const allProjects = await MockDB.getProjects(Auth.role(_user));
    const visProjects = allProjects.filter(p => Auth.canViewProject(_user, p.slug));
    document.getElementById('nav-projects-menu').innerHTML = visProjects.map(p =>
      `<a href="${p.custom_url || '/project/index.html?slug=' + p.slug}" class="${p.slug === _slug ? 'active' : ''}">
        <span class="menu-icon">${p.icon}</span> ${p.name}
      </a>`
    ).join('') || '<div class="dropdown-label">No projects available</div>';
    if (typeof lucide !== 'undefined') lucide.createIcons();

    // Theme toggle
    document.getElementById('btn-theme').addEventListener('click', () => ThemeToggle.toggle());

    // Fetch project info
    const project = await MockDB.getProjectBySlug(_slug);
    if (!project) { showState('❌', 'Project not found', 'The requested project does not exist.'); return; }

    document.title = `Travel Blue | ${project.name}`;
    document.getElementById('proj-icon-banner').textContent = project.icon || '📊';
    document.getElementById('proj-name-banner').textContent  = project.name;
    document.getElementById('proj-desc-banner').textContent  = project.description || '';

    // Show Update Data button for owner/admin
    if (Auth.isAdminOrOwner(_user)) {
      document.getElementById('editor-toggle').style.display = 'block';
      const updateBtn = document.createElement('button');
      updateBtn.textContent = '⬆ Update Data';
      updateBtn.style.cssText = 'position:fixed;bottom:72px;right:24px;z-index:999;padding:10px 18px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.2);';
      updateBtn.onclick = () => { window.location.href = `/admin/index.html?upload=${_slug}`; };
      document.body.appendChild(updateBtn);
    }

    // Fetch meta + rows
    const [metaResult, rowsResult] = await Promise.all([
      _sbClient.from('project_meta').select('*').eq('project_slug', _slug).maybeSingle(),
      _sbClient.from('project_data').select('row_data').eq('project_slug', _slug)
    ]);

    _meta = metaResult.data;
    const rows = rowsResult.data || [];

    if (!rows.length) {
      const isOwner = Auth.isAdminOrOwner(_user);
      showState('📭', 'No data yet',
        isOwner ? 'Upload a CSV to generate this dashboard.' : 'Data is being prepared. Check back soon.',
        isOwner ? `<div style="margin-top:16px;"><a href="/admin/index.html?upload=${_slug}" style="display:inline-block;padding:10px 24px;background:var(--navy);color:#fff;border-radius:7px;text-decoration:none;font-weight:700;font-size:13px;">⬆ Upload CSV</a></div>` : ''
      );
      return;
    }

    _projectData = rows.map(r => r.row_data);
    const colTypes    = _meta?.column_types || {};
    _chartConfig      = _meta?.chart_config  || colTypes; // editor overrides column_types

    renderDashboard();
  })();

  /* ── Render all dashboard sections ── */
  function renderDashboard() {
    const ct = _chartConfig;
    const allCols      = Object.keys(ct);
    const numericCols  = allCols.filter(c => ct[c] === 'numeric' || ct[c] === 'KPI' || ct[c] === 'Line' || ct[c] === 'Bar');
    const dateCols     = allCols.filter(c => ct[c] === 'date' || ct[c] === 'Line');
    const categoryCols = allCols.filter(c => ct[c] === 'categorical' || ct[c] === 'Bar');
    const hiddenCols   = allCols.filter(c => ct[c] === 'Hidden');
    const tableCols    = allCols.filter(c => ct[c] !== 'Hidden');

    // Determine which columns are truly numeric for KPIs
    const kpiCols = allCols.filter(c => {
      const t = ct[c];
      if (t === 'Hidden') return false;
      const raw = _meta?.column_types?.[c];
      return raw === 'numeric' || t === 'KPI';
    });

    // Destroy previous charts
    _activeCharts.forEach(ch => ch.destroy());
    _activeCharts.length = 0;

    const sections = [];

    // ── KPI cards ──
    if (kpiCols.length) {
      const cards = kpiCols.map(col => {
        const vals = _projectData
          .map(r => parseFloat(String(r[col] ?? '').replace(/[$€£,\s%]/g, '')))
          .filter(v => !isNaN(v));
        if (!vals.length) return '';
        const total = vals.reduce((a, b) => a + b, 0);
        const avg   = total / vals.length;
        const max   = Math.max(...vals);
        return `
          <div class="kpi-card">
            <div class="kpi-label">${col}</div>
            <div class="kpi-value">${fmt(total)}</div>
            <div class="kpi-sub">Avg: ${fmt(avg)} · Max: ${fmt(max)}</div>
          </div>`;
      }).join('');
      if (cards.trim())
        sections.push(`<div class="dash-section"><div class="dash-section-title">Key Metrics</div><div class="kpi-row">${cards}</div></div>`);
    }

    // ── Charts ──
    const chartCards = [];
    const usedDateCol = dateCols.length ? dateCols[0] : null;
    const usedCatCols = categoryCols.filter(c => c !== usedDateCol);
    const chartNumCols = allCols.filter(c => {
      const raw = _meta?.column_types?.[c];
      return raw === 'numeric' && ct[c] !== 'Hidden';
    });

    if (usedDateCol && chartNumCols.length) {
      const canvasId = 'chart-line-0';
      chartCards.push(`
        <div class="chart-card">
          <div class="chart-card-title">📈 Trend over time — ${usedDateCol}</div>
          <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
        </div>`);
    }

    if (usedCatCols.length && chartNumCols.length) {
      const catCol = usedCatCols[0];
      const numCol = chartNumCols[0];
      const canvasId = 'chart-bar-0';
      chartCards.push(`
        <div class="chart-card">
          <div class="chart-card-title">📊 ${numCol} by ${catCol}</div>
          <div class="chart-wrap"><canvas id="${canvasId}"></canvas></div>
        </div>`);

      if (usedCatCols.length > 1 || chartNumCols.length > 1) {
        const catCol2 = usedCatCols[1] || usedCatCols[0];
        const numCol2 = chartNumCols[1] || chartNumCols[0];
        if (numCol2 !== numCol || catCol2 !== catCol) {
          chartCards.push(`
            <div class="chart-card">
              <div class="chart-card-title">🍩 Distribution — ${catCol2}</div>
              <div class="chart-wrap"><canvas id="chart-donut-0"></canvas></div>
            </div>`);
        }
      }
    }

    if (chartCards.length)
      sections.push(`<div class="dash-section"><div class="dash-section-title">Charts</div><div class="charts-row">${chartCards.join('')}</div></div>`);

    // ── Data table ──
    sections.push(`
      <div class="dash-section">
        <div class="dash-section-title">Data</div>
        <div class="dt-controls">
          <input class="dt-search" id="dt-search" type="search" placeholder="Search all columns…" oninput="onSearch(this.value)" />
          <span class="dt-count" id="dt-count"></span>
        </div>
        <div class="dt-table-wrap" id="dt-wrap"></div>
        <div class="dt-pagination" id="dt-pagination"></div>
      </div>`);

    document.getElementById('dash-main').innerHTML = sections.join('');

    // Now render charts (canvases exist in DOM)
    if (usedDateCol && chartNumCols.length) {
      requestAnimationFrame(() => _renderLineChart(usedDateCol, chartNumCols));
    }
    if (usedCatCols.length && chartNumCols.length) {
      requestAnimationFrame(() => {
        _renderBarChart(usedCatCols[0], chartNumCols[0]);
        if (document.getElementById('chart-donut-0')) {
          _renderDonutChart(usedCatCols[1] || usedCatCols[0], chartNumCols[1] || chartNumCols[0]);
        }
      });
    }

    // Render table
    _sortCol = tableCols[0] || null;
    _page = 0;
    renderTable();
  }

  /* ── Line chart ── */
  function _renderLineChart(dateCol, numCols) {
    const sorted = [..._projectData].sort((a, b) =>
      String(a[dateCol] ?? '').localeCompare(String(b[dateCol] ?? ''))
    );
    const labels   = sorted.map(r => r[dateCol] ?? '');
    const datasets = numCols.slice(0, 4).map((col, i) => ({
      label: col,
      data:  sorted.map(r => parseFloat(String(r[col] ?? '').replace(/[$€£,\s%]/g, '')) || 0),
      borderColor: CHART_COLORS[i], backgroundColor: CHART_COLORS[i] + '22',
      tension: 0.3, fill: true, pointRadius: sorted.length > 60 ? 0 : 3
    }));
    const ch = new Chart(document.getElementById('chart-line-0'), {
      type: 'line',
      data: { labels, datasets },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { boxWidth: 12, font: { size: 11 } } } },
        scales: { x: { ticks: { maxTicksLimit: 12, font: { size: 10 } } },
                  y: { ticks: { font: { size: 10 } } } } }
    });
    _activeCharts.push(ch);
  }

  /* ── Bar chart ── */
  function _renderBarChart(catCol, numCol) {
    const grouped = {};
    _projectData.forEach(r => {
      const k = String(r[catCol] ?? '—');
      grouped[k] = (grouped[k] || 0) + (parseFloat(String(r[numCol] ?? '').replace(/[$€£,\s%]/g, '')) || 0);
    });
    const entries = Object.entries(grouped).sort((a, b) => b[1] - a[1]).slice(0, 20);
    const ch = new Chart(document.getElementById('chart-bar-0'), {
      type: 'bar',
      data: {
        labels:   entries.map(e => e[0]),
        datasets: [{ label: numCol, data: entries.map(e => e[1]),
          backgroundColor: entries.map((_, i) => CHART_COLORS[i % CHART_COLORS.length] + 'cc') }]
      },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { x: { ticks: { font: { size: 10 }, maxRotation: 45 } },
                  y: { ticks: { font: { size: 10 } } } } }
    });
    _activeCharts.push(ch);
  }

  /* ── Donut chart ── */
  function _renderDonutChart(catCol, numCol) {
    const grouped = {};
    _projectData.forEach(r => {
      const k = String(r[catCol] ?? '—');
      grouped[k] = (grouped[k] || 0) + (parseFloat(String(r[numCol] ?? '').replace(/[$€£,\s%]/g, '')) || 0);
    });
    const entries = Object.entries(grouped).sort((a, b) => b[1] - a[1]).slice(0, 10);
    const ch = new Chart(document.getElementById('chart-donut-0'), {
      type: 'doughnut',
      data: {
        labels:   entries.map(e => e[0]),
        datasets: [{ data: entries.map(e => e[1]), backgroundColor: CHART_COLORS.slice(0, entries.length) }]
      },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 11 } } } } }
    });
    _activeCharts.push(ch);
  }

  /* ── Data table ── */
  function renderTable() {
    const ct       = _chartConfig;
    const cols     = Object.keys(ct).filter(c => ct[c] !== 'Hidden');
    const q        = _searchQuery.toLowerCase();

    const filtered = q
      ? _projectData.filter(r => cols.some(c => String(r[c] ?? '').toLowerCase().includes(q)))
      : _projectData;

    // Sort
    const sorted = _sortCol
      ? [...filtered].sort((a, b) => {
          const av = String(a[_sortCol] ?? ''), bv = String(b[_sortCol] ?? '');
          const an = parseFloat(av), bn = parseFloat(bv);
          const cmp = (!isNaN(an) && !isNaN(bn)) ? an - bn : av.localeCompare(bv);
          return _sortDir === 'asc' ? cmp : -cmp;
        })
      : filtered;

    const totalPages = Math.ceil(sorted.length / PAGE_SIZE);
    if (_page >= totalPages) _page = Math.max(0, totalPages - 1);
    const page = sorted.slice(_page * PAGE_SIZE, (_page + 1) * PAGE_SIZE);

    document.getElementById('dt-count').textContent =
      `${filtered.length.toLocaleString()} row${filtered.length !== 1 ? 's' : ''}${q ? ' (filtered)' : ''}`;

    document.getElementById('dt-wrap').innerHTML = `
      <table class="dt-table">
        <thead><tr>${cols.map(c => `
          <th class="${c === _sortCol ? 'sorted-' + _sortDir : ''}"
              onclick="onSortCol('${c.replace(/'/g,'\\\'')}')">${c}<span class="sort-icon"></span></th>
        `).join('')}</tr></thead>
        <tbody>${page.map(r => `
          <tr>${cols.map(c => `<td>${r[c] ?? '—'}</td>`).join('')}</tr>
        `).join('')}</tbody>
      </table>`;

    // Pagination
    const pagEl = document.getElementById('dt-pagination');
    if (totalPages <= 1) { pagEl.innerHTML = ''; return; }
    const pageLinks = [];
    for (let i = 0; i < totalPages; i++) {
      if (totalPages > 7 && i > 2 && i < totalPages - 2 && Math.abs(i - _page) > 1) {
        if (pageLinks[pageLinks.length - 1] !== '…') pageLinks.push('…');
        continue;
      }
      pageLinks.push(i);
    }
    pagEl.innerHTML = `
      <button onclick="onPage(${_page - 1})" ${_page === 0 ? 'disabled' : ''}>‹</button>
      ${pageLinks.map(p => typeof p === 'number'
        ? `<button class="${p === _page ? 'active' : ''}" onclick="onPage(${p})">${p + 1}</button>`
        : `<span style="padding:0 4px;color:var(--gray);">…</span>`
      ).join('')}
      <button onclick="onPage(${_page + 1})" ${_page >= totalPages - 1 ? 'disabled' : ''}>›</button>`;
  }

  function onSearch(q)       { _searchQuery = q; _page = 0; renderTable(); }
  function onSortCol(col)    {
    if (_sortCol === col) _sortDir = _sortDir === 'asc' ? 'desc' : 'asc';
    else { _sortCol = col; _sortDir = 'asc'; }
    _page = 0; renderTable();
  }
  function onPage(p)         { _page = p; renderTable(); }

  /* ── Dashboard Editor ── */
  function toggleEditor() {
    document.getElementById('editor-panel').classList.toggle('open');
    if (document.getElementById('editor-panel').classList.contains('open')) {
      buildEditorUI();
    }
  }

  function buildEditorUI() {
    const ct   = _meta?.column_types || {};
    const cfg  = _chartConfig || ct;
    const OPTS = ['KPI', 'Line', 'Bar', 'Table', 'Hidden'];

    document.getElementById('editor-cols').innerHTML = Object.keys(ct).map(col => {
      const rawType = ct[col];
      const curVal  = cfg[col] || rawType;
      return `
        <div class="editor-col-row">
          <div>
            <div class="editor-col-name">${col}</div>
            <div class="editor-col-type">detected: ${rawType}</div>
          </div>
          <select class="editor-col-select" data-col="${col}">
            ${OPTS.map(o => `<option value="${o}" ${curVal === o || (curVal === rawType && o === rawType) ? 'selected' : ''}>${o}</option>`).join('')}
          </select>
        </div>`;
    }).join('');
  }

  async function saveEditorConfig() {
    const selects = document.querySelectorAll('.editor-col-select');
    const newCfg  = {};
    selects.forEach(s => { newCfg[s.dataset.col] = s.value; });

    // Save to project_meta.chart_config
    const _svc = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_SERVICE_KEY,
      { auth: { autoRefreshToken: false, persistSession: false, detectSessionInUrl: false } });
    await _svc.from('project_meta').upsert(
      { project_slug: _slug, chart_config: newCfg },
      { onConflict: 'project_slug' }
    );

    _chartConfig = newCfg;
    toggleEditor();
    renderDashboard();
  }
  </script>
</body>
</html>
