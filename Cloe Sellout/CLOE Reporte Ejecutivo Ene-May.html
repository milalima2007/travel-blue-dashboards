function fmtNum(v){
  if (v===null||v===undefined||v==='') return '';
  if (typeof v!=='number') return v;
  if (Math.abs(v)<1 && v!==0) return (v*100).toFixed(1)+'%';
  return v.toLocaleString('es-MX',{maximumFractionDigits:0});
}
function isPct(header){
  return /var|%|particip/i.test(header||'');
}
function fmtCell(v, header){
  if (v===null||v===undefined||v==='') return '';
  if (typeof v==='number' && isPct(header)) return (v*100).toFixed(1)+'%';
  if (typeof v==='number') return v.toLocaleString('es-MX',{maximumFractionDigits:2});
  return v;
}
function cellClass(v, header){
  if (typeof v==='number' && isPct(header)){ return v<0?'neg':'pos'; }
  return '';
}

function renderBlock(b){
  if (b.type==='title') return '<h2>'+b.text+'</h2>';
  if (b.type==='meta'){
    return b.rows.map(r=>'<div class="meta-row"><b>'+r[0]+'</b><span>'+(r[1]||'')+'</span></div>').join('');
  }
  if (b.type==='text'){
    return b.rows.map(r=>'<div class="meta-row"><b>'+r[0]+'</b><span>'+(r[1]||'')+'</span></div>').join('');
  }
  if (b.type==='table' || b.type==='kv'){
    var headers = b.headers || [];
    var html = '<table><thead><tr>';
    headers.forEach(h=>html+='<th>'+h+'</th>');
    html += '</tr></thead><tbody>';
    b.rows.forEach(row=>{
      html += '<tr>';
      row.forEach((c,i)=>{
        var h = headers[i]||'';
        html += '<td class="'+cellClass(c,h)+'">'+fmtCell(c,h)+'</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
  }
  return '';
}

function renderSheet(sh){
  if (!sh.blocks.length) return '<div class="empty-sheet">(Sin contenido — hoja vacía en el reporte original)</div>';
  return sh.blocks.map(b=>'<div class="block">'+renderBlock(b)+'</div>').join('');
}

function init(){
  var nav = document.getElementById('nav');
  var main = document.getElementById('main');
  REPORT.sheets.forEach((sh,i)=>{
    var btn = document.createElement('button');
    btn.textContent = sh.name;
    btn.onclick = ()=>showSheet(i);
    btn.id = 'navbtn-'+i;
    nav.appendChild(btn);
    var div = document.createElement('div');
    div.className = 'sheet';
    div.id = 'sheet-'+i;
    div.innerHTML = renderSheet(sh);
    main.appendChild(div);
  });
  showSheet(0);
}
function showSheet(i){
  document.querySelectorAll('.sheet').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('#nav button').forEach(el=>el.classList.remove('active'));
  document.getElementById('sheet-'+i).classList.add('active');
  document.getElementById('navbtn-'+i).classList.add('active');
}

function blockToAoa(b){
  var rows = [];
  if (b.type==='title'){ rows.push([b.text]); }
  else if (b.type==='meta' || b.type==='text'){
    b.rows.forEach(r=>rows.push([r[0], r[1]||'']));
  } else if (b.type==='table' || b.type==='kv'){
    if (b.headers) rows.push(b.headers);
    b.rows.forEach(r=>rows.push(r));
  }
  rows.push([]);
  return rows;
}

function downloadAll(){
  var wb = XLSX.utils.book_new();
  REPORT.sheets.forEach(sh=>{
    var aoa = [];
    sh.blocks.forEach(b=>{ aoa = aoa.concat(blockToAoa(b)); });
    if (!aoa.length) aoa = [['']];
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    var name = sh.name.length>31 ? sh.name.substring(0,31) : sh.name;
    XLSX.utils.book_append_sheet(wb, ws, name);
  });
  XLSX.writeFile(wb, 'CLOE Reporte Ejecutivo Ene-May.xlsx');
}

init();
